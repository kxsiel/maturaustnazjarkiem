<!DOCTYPE html>

    <style>
        :root { --ink: #1a1209; --paper: #f5f0e8; --gold: #c8a84b; --border: #d4c9b0; }
        body { background: var(--paper); color: var(--ink); font-family: 'Lato', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 350px; background: #ece6d6; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-h { padding: 20px; background: var(--ink); color: white; }
        .search-box { padding: 10px; border-bottom: 1px solid var(--border); }
        .search-box input { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; }
        #qList { flex: 1; overflow-y: auto; }
        .era-header { padding: 8px 15px; background: #dcd4c1; font-weight: 900; font-size: 11px; text-transform: uppercase; color: #5a4e38; position: sticky; top: 0; }
        .q-item { padding: 10px 15px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13px; transition: 0.2s; }
        .q-item:hover { background: rgba(200, 168, 75, 0.1); }
        .q-item.active { background: var(--ink); color: var(--gold); }

        .main { flex: 1; overflow-y: auto; padding: 40px; background: #fdfcf9; }
        .card { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { font-family: 'Playfair Display', serif; margin-bottom: 10px; }
        textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 15px; font-family: inherit; font-size: 15px; }
        
        .btn { background: var(--ink); color: var(--gold); border: none; padding: 16px; font-weight: 900; cursor: pointer; width: 100%; border-radius: 4px; font-size: 14px; }
        .btn:disabled { opacity: 0.5; }

        #feedback { margin-top: 25px; padding: 20px; border-top: 4px solid var(--gold); background: #f9f9f9; display: none; line-height: 1.6; }
        .loader { display: none; text-align: center; color: var(--gold); margin: 15px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-h">
        <div style="font-weight: 900; font-size: 18px;">MATURA USTNA</div>
        <div id="count" style="font-size: 11px; opacity: 0.7;">70 pytań jawnych</div>
    </div>
    <div class="search-box"><input type="text" id="search" placeholder="Szukaj tematu..." oninput="render()"></div>
    <div id="qList"></div>
</div>

        <p>AI oceni Twój plan wypowiedzi zgodnie z kluczem CKE.</p>
    </div>

    <div id="editor" style="display:none;">
        <div class="card">
            <h1 id="qTitle"></h1>
            <p id="qSource" style="font-style: italic; color: #666; margin-bottom: 25px;"></p>

            <label>TWOJA TEZA:</label>
            <textarea id="inT" rows="2"></textarea>
            
            <label>ARGUMENTACJA (LEKTURA):</label>
            <textarea id="inL" rows="5"></textarea>
            
            <label>KONTEKST:</label>
            <textarea id="inK" rows="2"></textarea>

            <button id="btn" class="btn" onclick="askAI()">SPRAWDŹ Z EGZAMINATOREM AI</button>
            <div id="loader" class="loader">Egzaminator analizuje... Czekaj...</div>
            <div id="feedback"></div>

</div>

let sel = null;

function render() {
    const search = document.getElementById('search').value.toLowerCase();
    const list = document.getElementById('qList');
    list.innerHTML = '';
    let lastEra = "";
    Q.filter(q => q.t.toLowerCase().includes(search)).forEach((q, i) => {
        if(q.e !== lastEra) {
            lastEra = q.e;
            const h = document.createElement('div'); h.className = 'era-header'; h.innerText = lastEra;
            list.appendChild(h);
        }
        const item = document.createElement('div');
        item.className = 'q-item' + (sel === q ? ' active' : '');
        item.innerHTML = `<b>${q.t}</b><br><small>${q.s}</small>`;
        item.onclick = () => {
            sel = q;
            document.getElementById('welcome').style.display = 'none';
            document.getElementById('editor').style.display = 'block';
            document.getElementById('qTitle').innerText = q.t;
            document.getElementById('qSource').innerText = "Lektura: " + q.s;
            document.getElementById('feedback').style.display = 'none';
            render();
        };
        list.appendChild(item);
    });
}

async function askAI() {
    const btn = document.getElementById('btn');
    const loader = document.getElementById('loader');
    const fb = document.getElementById('feedback');
    
    const prompt = `Jesteś egzaminatorem maturalnym. Oceń odpowiedź:
    Temat: ${sel.t}
    Teza: ${document.getElementById('inT').value}
    Lektura: ${document.getElementById('inL').value}
    Kontekst: ${document.getElementById('inK').value}
    Wypisz: 1. Błędy, 2. Co jest dobrze, 3. Ocena 0-10 pkt. Formatuj w HTML (br, b).`;

    btn.disabled = true;
    loader.style.display = 'block';
    fb.style.display = 'none';

    try {
        const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=openai&cache=no`);
        const text = await response.text();
        
        fb.innerHTML = "<h3>Werdykt Egzaminatora:</h3>" + text.replace(/\n/g, "<br>");
        fb.style.display = 'block';
    } catch (e) {
        fb.innerHTML = "<b style='color:red'>AI nie odpowiada. Kliknij jeszcze raz.</b>";
        fb.style.display = 'block';
    } finally {
        btn.disabled = false;
        loader.style.display = 'none';
    }
}

render();
</script>
