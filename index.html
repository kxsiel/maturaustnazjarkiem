<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matura Ustna – Trening</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209;
    --paper: #f5f0e8;
    --cream: #ece6d6;
    --gold: #c8a84b;
    --gold-dark: #9b7e32;
    --red: #8b2a2a;
    --green: #2a6b3c;
    --muted: #7a6e5e;
    --border: #d4c9b0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 4px solid var(--gold);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  header h1 span { color: var(--gold); }
  .header-meta { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  /* LAYOUT */
  .app { display: flex; height: calc(100vh - 73px); }

  /* SIDEBAR */
  .sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--cream);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding-bottom: 20px;
  }
  .sidebar-top {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--cream);
    z-index: 10;
  }
  .filter-input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--paper);
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    color: var(--ink);
    outline: none;
  }
  .filter-input:focus { border-color: var(--gold); }
  .era-group { margin-top: 4px; }
  .era-label {
    padding: 8px 16px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-dark);
    background: var(--ink);
    display: block;
    margin-top: 8px;
  }
  .question-btn {
    display: block;
    width: 100%;
    text-align: left;
    padding: 10px 16px;
    background: none;
    border: none;
    border-bottom: 1px solid var(--border);
    font-family: 'Lato', sans-serif;
    font-size: 0.82rem;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s;
    line-height: 1.4;
  }
  .question-btn:hover { background: rgba(200,168,75,0.1); }
  .question-btn.active { background: var(--ink); color: var(--gold); font-weight: 700; }
  .q-done { color: var(--green); }
  .q-done::after { content: ' ✓'; }

  /* MAIN */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 48px;
    max-width: 900px;
  }

  /* WELCOME */
  #welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    gap: 16px;
  }
  #welcome h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 900;
    line-height: 1.2;
  }
  #welcome p { color: var(--muted); max-width: 480px; line-height: 1.7; font-size: 0.95rem; }
  #welcome .stats {
    display: flex;
    gap: 24px;
    margin-top: 8px;
  }
  .stat-box {
    background: var(--ink);
    color: var(--paper);
    padding: 16px 24px;
    border-radius: 4px;
    text-align: center;
  }
  .stat-box .num {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--gold);
    display: block;
  }
  .stat-box .lbl { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; }

  /* QUESTION VIEW */
  #question-view { display: none; }
  .q-header {
    border-bottom: 2px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 24px;
  }
  .q-era {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-dark);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .q-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.3;
  }
  .q-source {
    margin-top: 6px;
    font-size: 0.85rem;
    color: var(--muted);
    font-style: italic;
  }

  /* INFO BOX (wzór) */
  .info-box {
    background: var(--cream);
    border: 1px solid var(--border);
    border-left: 4px solid var(--gold);
    padding: 16px 20px;
    border-radius: 0 4px 4px 0;
    margin-bottom: 24px;
  }
  .info-box-title {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold-dark);
    margin-bottom: 10px;
  }
  .info-box p { font-size: 0.88rem; line-height: 1.7; color: var(--ink); }

  /* FORM */
  .form-section { margin-bottom: 20px; }
  .form-label {
    display: block;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .form-label span {
    color: var(--gold-dark);
    font-size: 0.9em;
    margin-left: 4px;
  }
  textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: white;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    line-height: 1.6;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--gold); }
  textarea::placeholder { color: #bbb; }

  .submit-btn {
    background: var(--ink);
    color: var(--gold);
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 14px 36px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
  }
  .submit-btn:hover { background: #2d2316; }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* FEEDBACK */
  #feedback-box { margin-top: 28px; }
  .feedback-loading {
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-style: italic;
    padding: 16px 0;
  }
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .feedback-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .feedback-card-header {
    background: var(--ink);
    color: var(--paper);
    padding: 12px 20px;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .score-badge {
    background: var(--gold);
    color: var(--ink);
    font-family: 'Lato', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    letter-spacing: 0.05em;
  }
  .feedback-body {
    padding: 20px;
    background: white;
  }
  .feedback-section { margin-bottom: 16px; }
  .feedback-section:last-child { margin-bottom: 0; }
  .fb-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .fb-label.ok { color: var(--green); }
  .fb-label.warn { color: #c06000; }
  .fb-label.bad { color: var(--red); }
  .feedback-section p { font-size: 0.88rem; line-height: 1.7; }

  .next-btn {
    background: none;
    border: 2px solid var(--gold);
    color: var(--gold-dark);
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    font-weight: 700;
    padding: 10px 28px;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.2s;
  }
  .next-btn:hover { background: var(--gold); color: var(--ink); }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    position: fixed;
    top: 73px;
    left: 0;
    right: 0;
    z-index: 99;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.4s ease;
  }

  /* SHOW HINT */
  .hint-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Lato', sans-serif;
    font-size: 0.78rem;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    margin-bottom: 16px;
    transition: all 0.2s;
  }
  .hint-toggle:hover { border-color: var(--gold); color: var(--gold-dark); }
  .hint-box {
    display: none;
    background: #fffdf5;
    border: 1px dashed var(--gold);
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    line-height: 1.7;
    color: #5a4e38;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>

<header>
  <div>
    <h1>Matura <span>Ustna</span> – Trening</h1>
    <div class="header-meta">Pytania jawne · Analiza AI</div>
  </div>
  <div id="headerProgress" style="font-size:0.85rem;color:var(--muted);"></div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-top">
      <input class="filter-input" type="text" id="filterInput" placeholder="🔍 Szukaj pytania…" oninput="filterQuestions()">
    </div>
    <div id="questionList"></div>
  </aside>

  <main class="main">
    <div id="welcome">
      <h2>Ćwicz przed maturą<br>ustną z AI</h2>
      <p>Wybierz pytanie z listy po lewej. Wpisz tezę, treść lektury i kontekst życiowy — AI natychmiast oceni Twoją odpowiedź i wskaże, co poprawić.</p>
      <div class="stats">
        <div class="stat-box"><span class="num" id="statTotal">0</span><span class="lbl">Pytań</span></div>
        <div class="stat-box"><span class="num" id="statDone" style="color:#7fbe96">0</span><span class="lbl">Zrobionych</span></div>
      </div>
    </div>

    <div id="question-view">
      <div class="q-header">
        <div class="q-era" id="qEra"></div>
        <div class="q-title" id="qTitle"></div>
        <div class="q-source" id="qSource"></div>
      </div>

      <button class="hint-toggle" onclick="toggleHint()">👁 Pokaż wzorcową odpowiedź</button>
      <div class="hint-box" id="hintBox">
        <strong>Wzorcowa teza:</strong> <span id="hintTeza"></span><br><br>
        <strong>Treść lektury:</strong> <span id="hintLektura"></span><br><br>
        <strong>Kontekst:</strong> <span id="hintKontekst"></span>
      </div>

      <div class="form-section">
        <label class="form-label">1. Teza <span>— jedno zdanie twierdzące</span></label>
        <textarea id="inputTeza" rows="3" placeholder="Np. Cierpienie nie zawsze jest karą za grzechy; bywa niezbadaną próbą wiary…"></textarea>
      </div>
      <div class="form-section">
        <label class="form-label">2. Treść lektury <span>— co dzieje się w utworze?</span></label>
        <textarea id="inputLektura" rows="5" placeholder="Opisz fabułę, bohaterów, najważniejsze sceny i wątki powiązane z pytaniem…"></textarea>
      </div>
      <div class="form-section">
        <label class="form-label">3. Kontekst życiowy <span>— współczesne nawiązanie</span></label>
        <textarea id="inputKontekst" rows="4" placeholder="Nawiąż do współczesnego życia, zjawisk społecznych, technologii, sportu, nauki…"></textarea>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="analyzeAnswer()">Zatwierdź i oceń →</button>

      <div id="feedback-box"></div>
    </div>
  </main>
</div>

<script>
const QUESTIONS = [
  // BIBLIA I ANTYK
  { era: "Biblia i Antyk", title: "Motyw cierpienia niezawinionego", source: "Księga Hioba", teza: "Cierpienie nie zawsze jest karą za grzechy; bywa niezbadaną próbą wiary i elementem boskiego planu.", lektura: "Hiob traci majątek, dzieci i zdrowie, mimo że jest bezgranicznie prawy i bogobojny. Nie przeklina Boga, godzi się z losem i ostatecznie zostaje nagrodzony.", kontekst: "Poważne choroby (np. nowotwór u małego dziecka) lub nagłe klęski żywiołowe. Dotykają one uczciwych, dobrych ludzi, pokazując, że w życiu często nie ma sprawiedliwości opartej na zasadzie 'dobre uczynki to brak problemów'." },
  { era: "Biblia i Antyk", title: "Człowiek wobec niestałości świata", source: "Księga Koheleta", teza: "Dobra doczesne są znikome i przemijające (vanitas vanitatum – marność nad marnościami).", lektura: "Kohelet udowadnia, że bogactwo, sława i uciechy nie dają trwałego szczęścia, bo i tak kończą się śmiercią. Należy korzystać z prostych radości życia z zachowaniem bojaźni Bożej.", kontekst: "Pogoń za zasięgami, lajkami i bogactwem na Instagramie/TikToku. Złudne poczucie szczęścia oparte na statusie materialnym często prowadzi do wypalenia zawodowego i depresji." },
  { era: "Biblia i Antyk", title: "Wizja końca świata", source: "Apokalipsa św. Jana", teza: "Koniec świata to zarazem absolutna destrukcja zła i początek nowego, sprawiedliwego porządku.", lektura: "Symboliczne obrazy grozy (Czterej Jeźdźcy, kataklizmy, Bestia), po których następuje ostateczne zwycięstwo Boga, Sąd Ostateczny i nadejście Nowego Jeruzalem.", kontekst: "Lęk współczesnego człowieka przed globalnym ociepleniem, katastrofą klimatyczną czy zagrożeniem wojną nuklearną. Te codzienne lęki przypominają apokaliptyczne nastroje znane z Biblii." },
  { era: "Biblia i Antyk", title: "Poświęcenie się w imię wyższych wartości", source: "Mitologia, Jan Parandowski", teza: "Najwyższą formą heroizmu jest całkowite oddanie siebie w imię miłości do ludzkości lub ojczyzny.", lektura: "Prometeusz ulepił człowieka, a widząc jego słabość, wykradł dla niego ogień z Olimpu i nauczył rzemiosła, za co poniósł wieczną karę (przybicie do Kaukazu).", kontekst: "Ratownicy medyczni, lekarze na oddziałach zakaźnych (np. w trakcie pandemii) lub strażacy. Narażają własne zdrowie i życie, by ratować innych." },
  { era: "Biblia i Antyk", title: "Problematyka winy i kary", source: "Mitologia, Jan Parandowski", teza: "Złamanie praw boskich lub moralnych pociąga za sobą nieuchronną, często wieczną karę.", lektura: "Syzyf za zdradzanie boskich tajemnic i uwięzienie Tanatosa (Śmierci) zostaje skazany na bezcelową, wieczną pracę wtaczania głazu na górę.", kontekst: "Zjawisko hejtu w internecie lub nękania w szkole. Sprawca często czuje się bezkarny, jednak z czasem spotyka go sprawiedliwość w postaci wyrzutów sumienia lub konsekwencji prawnych." },
  { era: "Biblia i Antyk", title: "Miłość silniejsza niż śmierć", source: "Mitologia, Jan Parandowski", teza: "Prawdziwe uczucie potrafi pokonać najgroźniejsze przeszkody, łącznie z granicą zaświatów.", lektura: "Orfeusz z miłości do zmarłej Eurydyki schodzi do mrocznego Hadesu. Słuchem i śpiewem wzrusza bogów podziemi, zyskując szansę na wyprowadzenie żony.", kontekst: "Pielęgnowanie pamięci o bliskich zmarłych. Ludzie często zakładają fundacje imienia zmarłych dzieci lub małżonków, dzięki czemu miłość do tej osoby 'żyje' nadal." },
  { era: "Biblia i Antyk", title: "Heroizm jako postawa człowieka w zmaganiu się z losem", source: "Iliada, Homer", teza: "Heroizm to wierność kodeksowi honorowemu i odwaga w obliczu nieuchronnej śmierci.", lektura: "Hektor staje do pojedynku z potężniejszym Achillesem. Mimo strachu i świadomości, że zginie, walczy do końca w obronie honoru i Troi.", kontekst: "Ratownicy z TOPR lub GOPR wychodzący w góry w skrajnych warunkach pogodowych, by ratować zaginionych turystów, mając świadomość własnego zagrożenia." },
  { era: "Biblia i Antyk", title: "Prawa boskie a prawa ludzkie", source: "Antygona, Sofokles", teza: "Prawa boskie (moralne, wieczne) stoją w hierarchii wyżej niż zmienne i niedoskonałe prawa stanowione przez człowieka.", lektura: "Antygona grzebie zwłoki brata Polinika, łamiąc zakaz króla Kreona. Uważa, że obowiązek religijny i miłość braterska są ważniejsze niż nakazy władcy.", kontekst: "Akty obywatelskiego nieposłuszeństwa (np. protesty na Białorusi czy strajki w obronie praw człowieka). Ludzie łamią odgórne nakazy rządu z powodów czysto moralnych." },
  { era: "Biblia i Antyk", title: "Człowiek wobec przeznaczenia", source: "Antygona, Sofokles", teza: "Przeznaczenie (fatum) jest nieuchronne, a próby ucieczki przed nim prowadzą do katastrofy (tragizm).", lektura: "Ród Labdakidów jest przeklęty. Działania Antygony i Kreona, choć z ich perspektywy słuszne, prowadzą do zguby, bo taki był wyrok losu.", kontekst: "Determinizm społeczny lub genetyczny. Ktoś urodzony w środowisku patologicznym z dziedzicznymi obciążeniami przeżywa walkę o wyjście 'na prostą' przypominającą starcie z greckim fatum." },

  // ŚREDNIOWIECZE I RENESANS
  { era: "Średniowiecze i Renesans", title: "Motyw cierpiącej matki", source: "Lament świętokrzyski", teza: "Obraz cierpienia matki po utracie dziecka humanizuje postacie święte i podkreśla uniwersalność bólu.", lektura: "Matka Boska pod krzyżem nie jest wyniosłą królową, lecz zwykłą, zrozpaczoną kobietą (Stabat Mater Dolorosa). Pragnie ulżyć synowi w cierpieniu i szuka współczucia u ludzi.", kontekst: "Współczesne matki doświadczające bólu po stracie dziecka (np. grupy wsparcia po wypadkach komunikacyjnych). Ich zmagania udowadniają, że więź macierzyńska i cierpienie po stracie od wieków pozostają takie same." },
  { era: "Średniowiecze i Renesans", title: "Motyw tańca śmierci", source: "Rozmowa Mistrza Polikarpa ze Śmiercią", teza: "Śmierć jest wszechpotężna, nieuchronna i absolutnie sprawiedliwa (egalitarna) – dotknie każdego.", lektura: "Groteskowy obraz rozkładającego się trupa kobiety. Śmierć chwali się, że w jej tańcu (danse macabre) równi są królowie, papieże, chłopi i filozofowie.", kontekst: "Wobec ciężkiej diagnozy onkologicznej czy wypadku, nasz status materialny lub zawodowy przestaje mieć znaczenie. Śmierć i biologia traktują wszystkich po równo." },
  { era: "Średniowiecze i Renesans", title: "Średniowieczny wzorzec rycerza", source: "Pieśń o Rolandzie", teza: "Idealny rycerz to człowiek bezwzględnie wierny Bogu, władcy i ojczyźnie, dbający nade wszystko o honor.", lektura: "Hrabia Roland wpada w zasadzkę w wąwozie Roncesvalles. Zbyt dumny, by wezwać pomoc rogiem, walczy do końca. Umiera na wzgórzu, twarzą do wroga, oddając rękawicę Bogu (ars moriendi).", kontekst: "Etos żołnierza zawodowego lub policjanta składającego przysięgę służenia ojczyźnie. Zobowiązują się stawiać dobro ogółu ponad własne, prywatne bezpieczeństwo." },
  { era: "Średniowiecze i Renesans", title: "Moralna odpowiedzialność za czyny", source: "Makbet, W. Szekspir", teza: "Każdy zły czyn niszczy psychikę sprawcy, a ucieczka przed moralną odpowiedzialnością jest niemożliwa.", lektura: "Makbet zabija króla Duncana. Zbrodnia pociąga za sobą kolejne, a bohaterowie wpadają w obłęd (halucynacje Makbeta, natręctwo mycia rąk przez Lady Makbet).", kontekst: "Osoby dopuszczające się przestępstw finansowych lub wieloletnich kłamstw. Nawet jeśli uciekną przed prawem, ciągły stres i strach przed zdemaskowaniem niszczą ich psychikę." },
  { era: "Średniowiecze i Renesans", title: "Czy człowiek decyduje o własnym losie?", source: "Makbet, W. Szekspir", teza: "Człowiek ma wolną wolę – przepowiednie lub zewnętrzne okoliczności mogą kusić, ale ostateczna decyzja zależy od niego.", lektura: "Wiedźmy jedynie podsycają uśpioną ambicję Makbeta. To on sam, pchnięty żądzami i namowami żony, decyduje się pójść drogą morderstwa.", kontekst: "Uleganie presji rówieśniczej. Kiedy młody człowiek jest namawiany do czegoś niebezpiecznego, może tłumaczyć się presją, jednak to jego wola i charakter decydują o postępowaniu." },
  { era: "Średniowiecze i Renesans", title: "Jaki wpływ na człowieka ma sprawowanie władzy?", source: "Makbet, W. Szekspir", teza: "Władza zdobyta nieuczciwie korumpuje, rodzi paranoję i zamienia człowieka w tyrana.", lektura: "Makbet jako król żyje w ciągłym strachu przed utratą tronu. Staje się bezwzględnym dyktatorem, mordującym przyjaciół (Banko) i niewinne rodziny (Makdufa).", kontekst: "Zjawisko mobbingu w środowisku pracy. Nadanie komuś nawet najmniejszego stanowiska kierowniczego może ujawnić toksyczne i tyrańskie cechy charakteru wobec podwładnych." },

  // OŚWIECENIE I BAROK
  { era: "Oświecenie i Barok", title: "Czy dobra materialne czynią człowieka szczęśliwym?", source: "Skąpiec, Molier", teza: "Pieniądz, gdy staje się celem samym w sobie, niszczy człowieczeństwo i relacje z bliskimi.", lektura: "Harpagon kocha tylko swoją szkatułkę. Chciwość czyni go paranoikiem, niszczy życie jego dzieci i skazuje go na samotność i śmieszność.", kontekst: "Skrajny pracoholizm współczesnych rodziców, którzy próbują zabezpieczyć byt finansowy rodziny, pracując 24/7. Zdobywają bogactwo, ale stają się obcymi osobami dla własnych dzieci." },
  { era: "Oświecenie i Barok", title: "Przyczyny nieporozumień między rodzicami a dziećmi", source: "Skąpiec, Molier", teza: "Źródłem konfliktów pokoleniowych jest najczęściej odmienny system wartości i brak dialogu.", lektura: "Konflikt Harpagona z Kleantem i Elizą wynika z egoizmu ojca, który traktuje dzieci jak własność i przeszkodę finansową, ignorując ich prawo do miłości.", kontekst: "Częste spory dotyczące ścieżki kariery zawodowej. Rodzice pragną, aby dziecko wybrało opłacalny i stabilny zawód, a dziecko chce spełniać własne pasje." },
  { era: "Oświecenie i Barok", title: "Wady ludzkie w krzywym zwierciadle satyry", source: "Satyry, I. Krasicki", teza: "Śmiech satyryczny ma cel dydaktyczny – wytyka wady społeczne, by skłonić do poprawy (ucząc bawić).", lektura: "Pijaństwo (krytyka sarmackiego zamiłowania do alkoholu i pustych dyskusji politycznych) lub Żona modna (wyśmianie bezkrytycznego ulegania zagranicznej modzie i rozrzutności).", kontekst: "Współczesne kabarety, kanały stand-up oraz memy w internecie. Twórcy używają przesady i wyśmiewają nasze przywary, by obnażyć prawdę o naszym społeczeństwie." },

  // ROMANTYZM
  { era: "Romantyzm", title: "Świat ducha a świat rozumu", source: "Romantyczność, A. Mickiewicz", teza: "Poznanie racjonalne (szkiełko i oko) jest ograniczone; pełną prawdę o świecie daje intuicja, wiara i uczucie.", lektura: "Obłąkana Karusia widzi zmarłego Jasieńka. Prosty lud wierzy dziewczynie, podczas gdy Starzec (uosobienie oświeceniowego naukowca) szydzi z niej.", kontekst: "Zderzenie chłodnych algorytmów sztucznej inteligencji z człowiekiem. System komputerowy oceni zdolność kredytową w liczbach, a człowiek (doradca) potrafi spojrzeć na sytuację dłużnika z empatią." },
  { era: "Romantyzm", title: "Na czym polega ludowa sprawiedliwość?", source: "Ballady, A. Mickiewicz", teza: "W moralności ludowej nie ma zbrodni bez kary; natura aktywnie mści się za zło wyrządzone niewinnym.", lektura: "Lilije (żona zabija męża, a z grobu wyrastają lilije; ostatecznie cerkiew zapada się) lub Świtezianka (Strzelec za zdradę przysięgi wierności zostaje pochłonięty przez jezioro).", kontekst: "Powszechna wiara w popularną 'karmę'. Kiedy ktoś wykorzystuje ludzi do robienia kariery, często z czasem traci wszystko i pozostaje bez przyjaciół – dobro i zło bilansuje się w rzeczywistości." },
  { era: "Romantyzm", title: "Losy młodzieży polskiej pod zaborami", source: "Dziady cz. III, A. Mickiewicz", teza: "Młode pokolenie Polaków poddano brutalnym represjom, by zniszczyć w zarodku ducha patriotycznego.", lektura: "Sceny więzienne i opowieści męczeńskie: wywózki studentów i dzieci na Sybir (historia Janczewskiego), brutalne śledztwa (katowanie Cichowskiego, śmierć Rollisona).", kontekst: "Systemy totalitarne niszczące przyszłość młodych ludzi. Młodzież na Białorusi czy w Iranie angażująca się w politykę ponosi najwyższą karę, trafiając do więzień za upominanie się o wolność." },
  { era: "Romantyzm", title: "Mesjanizm jako romantyczna idea poświęcenia", source: "Dziady cz. III, A. Mickiewicz", teza: "Cierpienie narodu ma głęboki sens zbawczy – Polska jako 'Chrystus Narodów' swoją męką odkupi wolność Europy.", lektura: "Widzenie księdza Piotra. Polska ukazana na krzyżu, duszona przez cara (Heroda). Z jej krwi ma narodzić się przyszły wybawca narodu (tajemniczy 'Mąż 44').", kontekst: "Współcześni działacze społeczni na rzecz praw człowieka, którzy pozwalają na własne uwięzienie licząc na to, że ich cierpienie obudzi sumienia i wywoła zmianę w prawie." },
  { era: "Romantyzm", title: "Postawy społeczeństwa polskiego wobec zaborcy", source: "Dziady cz. III, A. Mickiewicz", teza: "Społeczeństwo jest głęboko podzielone na patriotyczną młodzież i lojalistyczną, zaprzańską elitę.", lektura: "Scena Salon Warszawski. Arystokracja podlizuje się carowi i krytykuje polską poezję. Młodzież rozmawia o martyrologii narodu (Cichowski). Słynne podsumowanie Wysockiego o 'lawie'.", kontekst: "Podział społeczeństwa w obliczu kryzysu uchodźczego czy wojny. Część obywateli angażuje się w ratowanie życia na granicach, a część zachowuje wrogość lub dba wyłącznie o swoje interesy." },
  { era: "Romantyzm", title: "Różne postawy człowieka wobec Boga", source: "Dziady cz. III, A. Mickiewicz", teza: "Człowiek może zbliżyć się do Boga przez pokorę lub oddalić się przez pychę i bunt.", lektura: "Prometejski bunt Konrada w Wielkiej Improwizacji (żąda rządu dusz, niemal bluźni) vs. pokora księdza Piotra ('Panie, czymże ja jestem przed Twoim obliczem? Prochem i niczem').", kontekst: "Pycha człowieka przekonanego, że dzięki medycynie i technologii jest 'panem natury'. Często zostaje boleśnie zweryfikowana podczas katastrofy (pandemii czy tsunami)." },
  { era: "Romantyzm", title: "Czym dla człowieka może być wolność?", source: "Dziady cz. III, A. Mickiewicz", teza: "Wolność to stan ducha, którego nie są w stanie zniszczyć fizyczne kajdany.", lektura: "Przemiana Gustawa w Konrada w celi więziennej (napis: 'Umarł Gustaw, narodził się Konrad'). Choć bohater jest zniewolony cieleśnie, zyskuje absolutną wolność twórczą i duchową.", kontekst: "Osoby odbywające wysokie wyroki, które w warunkach izolacji zdobywają wykształcenie, tworzą sztukę, nawracają się. Ich ciało jest uwięzione, jednak odkryli wolność osobistą." },

  // POZYTYWIZM I MŁODA POLSKA
  { era: "Pozytywizm i Młoda Polska", title: "Stracone złudzenia i klęska ideałów (Lalka – ogólnie)", source: "Lalka, Bolesław Prus", teza: "Lalka to powieść o straconych złudzeniach – ukazuje klęskę ideałów romantycznych i trudności w realizacji haseł pozytywistycznych.", lektura: "Wokulski idealizuje Izabelę Łęcką, tracąc przez to rozum i majątek. Ukazuje to rozkład moralny arystokracji, słabość mieszczaństwa i nędzę Powiśla.", kontekst: "Idealizowanie osób z 'wyższych sfer' w mediach społecznościowych. Zderzenie wyobrażeń z twardą rzeczywistością okazuje się brutalne i wyniszczające dla psychiki." },
  { era: "Pozytywizm i Młoda Polska", title: "Postawy odwagi i tchórzostwa", source: "Potop, H. Sienkiewicz", teza: "Prawdziwa odwaga to nie tylko brawura w walce, ale zdolność do poświęcenia prywaty dla ratowania ojczyzny.", lektura: "Kmicic z początku wykazuje odwagę straceńczą (awantury). Po przemianie w Babinicza wykazuje odwagę moralną i heroiczną (wysadzenie kolubryny pod Jasną Górą).", kontekst: "Posiadanie 'odwagi cywilnej' – postawienie się szkolnemu chuliganowi w obronie słabszego ucznia. Ryzykujemy wyśmianiem, ale ratujemy wyższe wartości i ludzkie zdrowie psychiczne." },
  { era: "Pozytywizm i Młoda Polska", title: "Co utrudnia porozumienie między grupami społecznymi?", source: "Wesele, S. Wyspiański", teza: "Przepaść mentalna, wzajemne uprzedzenia i pamięć o dawnych krwawych konfliktach uniemożliwiają solidarność narodową.", lektura: "Chłopi i inteligencja na weselu w Bronowicach. Inteligencja zachwyca się folklorem, ale nie rozumie realiów wsi. Chłopi pamiętają o Rabacji Galicyjskiej (widmo Jakuba Szeli).", kontekst: "Bańki informacyjne – każdy tworzy swój oddzielny świat i kręci się wokół tego samego źródła wiadomości. Prowadzi to do niszczenia dyskusji obywatelskiej." },
  { era: "Pozytywizm i Młoda Polska", title: "Rola chłopów i inteligencji w sprawie niepodległościowej", source: "Wesele, S. Wyspiański", teza: "Naród jest niezdolny do czynu: chłopi mają zapał, ale brak im kierownictwa, a inteligencja jest bierna i pogrążona w dekadentyzmie.", lektura: "Gospodarz dostaje od Wernyhory Złoty Róg (symbol czynu), ale oddaje go prostemu Jaśkowi. Jasiek gubi róg, schylając się po czapkę z piór (prywata). Szansa na powstanie przepada.", kontekst: "'Słomiany zapał' – ludzie mają na chwilę ogromne chęci i wiarę w czyny, by zaraz schować się do bezpiecznej kryjówki i zapomnieć o postanowieniach (jak zgubiony róg)." },
  { era: "Pozytywizm i Młoda Polska", title: "Obyczaj i tradycja w życiu społeczeństwa", source: "Chłopi, W.S. Reymont", teza: "Tradycja i rytuały integrują społeczność, dają poczucie bezpieczeństwa i wyznaczają rytm ludzkiej egzystencji.", lektura: "Życie Lipiec podporządkowane jest kalendarzowi liturgicznemu i porom roku. Opisy obrzędów (wesele Boryny, kiszenie kapusty, Zaduszki) pokazują gromadę jako jeden spójny organizm.", kontekst: "Nasze polskie Święta w grudniu czy niedzielne spotkania przy stole. W dzisiejszym zabieganym świecie tworzą potrzebną wyspę rutyny i stabilizacji dla rodziny." },

  // DWUDZIESTOLECIE
  { era: "Dwudziestolecie Międzywojenne", title: "Pytania jawne z Przedwiośnia (omówienie bloku)", source: "Przedwiośnie, Stefan Żeromski", teza: "Powieść stawia dramatyczne pytanie o kształt odrodzonej Polski, konfrontując ze sobą radykalizm i powolne reformy.", lektura: "Utopijna wizja Seweryna Baryki (szklane domy). Rzeź w Baku ukazana jako żywioł niszczycielski (konfrontacja z komunistą Lulkiem). Rozdarcie Cezarego między reformizmem Gajowca a radykalizmem komunistów.", kontekst: "Podejście do życiowych zmian: powolna dyscyplina finansowa ('reformizm Gajowca') vs. drastyczne i natychmiastowe działania takie jak wyniszczające diety czy ryzykowne kredyty ('rewolucja')." },
  { era: "Dwudziestolecie Międzywojenne", title: "Groteskowy obraz świata", source: "Ferdydurke, W. Gombrowicz", teza: "Groteska demaskuje absurdalność form społecznych i masek, w które wtłaczany jest człowiek.", lektura: "30-letni Józio zostaje cofnięty do szkoły ('upupienie'). Świat rządzony jest przez absurdalne schematy: nauczyciel Bladaczka wymuszający zachwyt nad Słowackim, 'przyprawianie gęby' u Młodziaków.", kontekst: "Absurdy wizyt w placówkach zdrowia lub podczas rekrutacji. Często zostajesz bezimiennym numerkiem i musisz kłamać oraz przyklejać sobie odpowiednie 'gęby', żeby urzędnik ci pomógł." },
  { era: "Dwudziestolecie Międzywojenne", title: "Człowiek wobec presji otoczenia", source: "Ferdydurke, W. Gombrowicz", teza: "Przed presją społeczeństwa ('Formą') nie ma ucieczki – człowiek zawsze przyjmuje jakąś maskę w relacji z innym człowiekiem.", lektura: "Józio ucieka ze szkoły do domu Młodziaków, a stamtąd do tradycyjnego dworku w Bolimowie. Wszędzie jednak wpada w kolejne schematy zachowań. Teza: 'Przed pupą nie ma ucieczki, jak tylko w inną pupę'.", kontekst: "Uleganie trendom ubrań, piosenek i slangu, byleby zostać zaakceptowanym w nowej paczce kolegów na wyjeździe edukacyjnym czy w pierwszej pracy." },

  // LITERATURA WOJENNA
  { era: "Literatura Wojny i Okupacji", title: "Człowiek zlagrowany jako ofiara zbrodniczego systemu", source: "Proszę państwa do gazu, T. Borowski", teza: "Ekstremalne warunki obozowe prowadzą do całkowitego upadku moralnego – przetrwanie wymaga odrzucenia dawnej etyki.", lektura: "Tadek pracujący na rampie w Auschwitz jest znieczulony na widok śmierci. Matki wyrzekają się własnych dzieci, by uniknąć komory gazowej. Rządzi prawo biologicznego przetrwania.", kontekst: "Bezwzględne prawa dzisiejszych gangów i karteli narkotykowych. W otoczeniu, gdzie walka toczy się o uniknięcie strzałów na ulicy, nikt nie myśli o dobrych obyczajach czy wyższych wartościach." },
  { era: "Literatura Wojny i Okupacji", title: "Znaczenie tytułu dla odczytania sensu utworu", source: "Inny świat, G. Herling-Grudziński", teza: "Tytuł sugeruje, że totalitarny obóz to przestrzeń o odwróconym dekalogu, do której nie można stosować normalnych miar moralnych.", lektura: "Motto z Dostojewskiego: 'Tu otwierał się inny, odrębny świat...'. W Jercewie zdrada, kradzież i donos są cnotami gwarantującymi życie, a litość i honor prowadzą do zguby.", kontekst: "Działanie sekciarskich i zmanipulowanych stowarzyszeń religijnych (np. sekta Moona). W ich chorym, odizolowanym systemie złe zachowania pod groźbą traktowane są jako wzór postępowania." },
  { era: "Literatura Wojny i Okupacji", title: "Czy możliwe jest zachowanie godności w skrajnych sytuacjach?", source: "Zdążyć przed Panem Bogiem, H. Krall", teza: "Godność w obliczu zagłady to możliwość wyboru własnej śmierci lub obrona słabszych bez szans na ocalenie.", lektura: "Marek Edelman o Powstaniu w Getcie Warszawskim. Powstańcy nie walczyli o zwycięstwo, lecz o to, by nie dać się biernie zaprowadzić na Umschlagplatz – o 'godne umieranie z bronią w ręku'.", kontekst: "Ludzie w krytycznym, terminalnym stadium chcą sami decydować o wycofaniu bolesnej procedury szpitalnej, aby pożegnanie z bliskimi odbyło się z jak największym prawem do spokoju." },

  // WSPÓŁCZESNOŚĆ
  { era: "Współczesność", title: "Co skłania człowieka do poświęceń?", source: "Dżuma, A. Camus", teza: "Do poświęcenia pcha człowieka zwykła przyzwoitość, niezgoda na zło oraz poczucie solidarności z cierpiącymi.", lektura: "Doktor Rieux, Tarrou czy Rambert ryzykują życie w zadżumionym Oranie. Nie uważają się za bohaterów – twierdzą, że walka z dżumą (złem) to kwestia uczciwości i logiczny wybór.", kontekst: "Zwyczajni Polacy, którzy spontanicznie przyjęli uchodźców ze Wschodu po starcie konfliktu – całkowicie bezinteresownie. Nie uważali się za wyższych herosów." },
  { era: "Współczesność", title: "Człowiek wobec cierpienia i śmierci", source: "Dżuma, A. Camus", teza: "Niewytłumaczalne cierpienie (zwłaszcza niewinnych) wywołuje bunt i zmusza do przewartościowania wiary.", lektura: "Agonia małego synka sędziego Othona. Wobec potwornego cierpienia dziecka załamują się dogmaty – Rieux buntuje się przeciwko światu, a ksiądz Paneloux zmienia ton swoich kazań.", kontekst: "Pytania wierzących i racjonalistów podczas obserwacji gigantycznych powodzi niszczących całe wsie lub potężnych trzęsień ziemi. Pytanie 'gdzie w tym sens?' weryfikuje dogmaty." },
  { era: "Współczesność", title: "Jakie postawy przyjmuje człowiek wobec zła?", source: "Dżuma, A. Camus", teza: "Wobec zła można przyjąć postawę aktywnego oporu, biernej ucieczki lub wręcz żerowania na cudzym nieszczęściu.", lektura: "Opór: Rieux i formacje sanitarne. Bierność/Ucieczka: początkowa postawa Ramberta (chce wyjechać do żony). Zysk: Cottard (przestępca, dla którego dżuma to eldorado).", kontekst: "Obserwacja przemocy w internecie lub bicia w pociągu. Jeden ucieknie z lęku, drugi nagra agresora, by pokazać materiał na straży praw, a ktoś kolejny zacznie okradać ofiarę." },
  { era: "Współczesność", title: "Czy możliwe jest zbudowanie doskonałego państwa?", source: "Rok 1984, G. Orwell", teza: "Utopie dążące do 'doskonałości' zawsze zamieniają się w krwawe antyutopie, niszczące jednostkę.", lektura: "Oceania to państwo 'idealnie' zorganizowane przez Partię, ale ceną tej perfekcji jest totalna inwigilacja (teleekrany), brak wolności myśli i permanentny terror.", kontekst: "Wprowadzanie 'punktowych systemów oceny społecznej' na Dalekim Wschodzie. Państwo twierdzi, że zapewni to ład, ale jednocześnie kontroluje absolutnie każdy krok obywatela." },
  { era: "Współczesność", title: "Jak zachować wolność w państwie totalitarnym?", source: "Rok 1984, G. Orwell", teza: "Ostatnim bastionem wolności w totalitaryzmie są uczucia, pamięć historyczna i niezależność myśli (choć system dąży do ich złamania).", lektura: "Winston Smith prowadzi zakazany pamiętnik, kupuje stary przycisk do papieru i wdaje się w nielegalny romans z Julią. Ostatecznie jednak system go łamie.", kontekst: "Prowadzenie ukrytego aktywizmu – wypisywanie tajnych blogów za pomocą zaszyfrowanej przeglądarki podczas rygorystycznego funkcjonowania systemu w najostrzejszych cenzurowanych dyktaturach." },
  { era: "Współczesność", title: "Znaczenie propagandy w państwie totalitarnym", source: "Rok 1984, G. Orwell", teza: "Propaganda służy fałszowaniu rzeczywistości i niszczeniu prawdy obiektywnej, by obywatele wierzyli w nieomylność władzy.", lektura: "Hasła Partii: 'Wojna to pokój, Wolność to niewola, Niewiedza to siła'. Ministerstwo Prawdy nieustannie fałszuje gazety i książki historyczne, by dopasować przeszłość do aktualnych potrzeb Wielkiego Brata.", kontekst: "Trole, boty i masowe fałszywe newsy przez generowane nagrania polityczne typu 'deepfake'. Totalnie przesterowują pojęcie przeciętnego człowieka w sieci na groźną opcję." },
  { era: "Współczesność", title: "Nowomowa jako sposób na ograniczenie wolności człowieka", source: "Rok 1984, G. Orwell", teza: "Redukcja i zubożenie języka prowadzi do uniemożliwienia sformułowania myśli buntowniczej (myślozbrodni).", lektura: "Partia wprowadza 'nowomowę' – usuwa słowa takie jak 'wolność' czy 'demokracja'. Jeśli człowiek nie zna słowa określającego dany koncept, nie jest w stanie o nim pomyśleć.", kontekst: "Posługiwanie się ogromną masą potocznego slangu i skrótów SMS. Oducza to krytycznego i szerokiego nazywania własnych doświadczeń lub zamyka debatę do chamskiego określenia w komentarzu bez argumentów." },
  { era: "Współczesność", title: "Bunt przeciwko porządkowi społecznemu", source: "Tango, S. Mrożek", teza: "Bunt pozbawiony wyższych idei kończy się fiaskiem i toruje drogę prymitywnej dyktaturze.", lektura: "Artur buntuje się przeciwko wolnościowemu chaosowi w domu. Chce siłą narzucić ślub i tradycję. Gdy odkrywa zdradę Ali, traci wiarę w formę i szuka idei w czystej władzy. Zostaje zabity przez Edka.", kontekst: "Mentalność ekstremistycznego chuligana – demolowanie przystanków przy okazji wielkich wydarzeń po przegranym starciu. Absolutnie nienoszące żadnej naprawy, a wylęgające jedynie prawo brutalnej pięści." },
  { era: "Współczesność", title: "Konflikt pokoleń", source: "Tango, S. Mrożek", teza: "Konflikt pokoleń u Mrożka jest odwrócony – to młodzi pragną zasad, a starzy lansują anarchię.", lektura: "Stomil i Eleonora (rodzice) to pokolenie awangardy, żyjące w wiecznym bałaganie i bez zasad moralnych. Artur (syn) pragnie porządku, konwenansu i tradycyjnej rodziny.", kontekst: "Sytuacja w Europie, gdzie część młodych uczniów konserwatywnie ocenia gospodarkę i stare wartości domowe w kontrze do absolutnie pobłażliwego traktowania finansów przez ich rodziców." },
  { era: "Współczesność", title: "Normy społeczne – ograniczają człowieka czy porządkują życie?", source: "Tango, S. Mrożek", teza: "Normy ograniczają swobodę, ale ich całkowity brak prowadzi do upadku wartości i paraliżu decyzyjnego.", lektura: "Dom Stomila to przestrzeń absolutnej wolności, w której 'wszystko wolno', co skutkuje nudą, brakiem szacunku i brudem (katafalk w salonie). Artur rozumie, że bez norm życie traci sens.", kontekst: "Zasady biurowe w miejscu zatrudnienia czy reguły drogowe na rondach. Gdyby nie istniały – na skrzyżowaniach czy wspólnych stołówkach zapanowałby brutalny chaos." },
  { era: "Współczesność", title: "Czym dla człowieka może być podróżowanie?", source: "Podróże z Herodotem, R. Kapuściński", teza: "Podróż to nie tylko przemieszczanie się w przestrzeni, ale przede wszystkim lekcja pokory, poznawanie Innego i poszerzanie horyzontów myślowych.", lektura: "Kapuściński wyjeżdża do Indii i Chin z Dziejami Herodota w kieszeni. Podróż uczy go przekraczania bariery własnego etnocentryzmu, a dawny tekst pomaga mu zrozumieć mechanizmy współczesnego świata.", kontekst: "Prawdziwe poznawanie rejonów przez Erasmus lub work & travel zamiast wakacji w odgrodzonych hotelach. Tylko przez wchodzenie z lokalsami do domów i na bazary rozwiewamy mity i uczymy się autentycznego języka." },
];

let currentIdx = null;
let doneSet = new Set(JSON.parse(localStorage.getItem('matDone') || '[]'));

function saveDone() { localStorage.setItem('matDone', JSON.stringify([...doneSet])); }

// Build sidebar
function buildSidebar(filter = '') {
  const container = document.getElementById('questionList');
  container.innerHTML = '';
  const lc = filter.toLowerCase();
  let groups = {};
  QUESTIONS.forEach((q, i) => {
    if (lc && !q.title.toLowerCase().includes(lc) && !q.source.toLowerCase().includes(lc) && !q.era.toLowerCase().includes(lc)) return;
    if (!groups[q.era]) groups[q.era] = [];
    groups[q.era].push({ q, i });
  });
  Object.entries(groups).forEach(([era, items]) => {
    const label = document.createElement('div');
    label.className = 'era-label';
    label.textContent = era;
    container.appendChild(label);
    items.forEach(({ q, i }) => {
      const btn = document.createElement('button');
      btn.className = 'question-btn' + (i === currentIdx ? ' active' : '') + (doneSet.has(i) ? ' q-done' : '');
      btn.textContent = q.title;
      btn.onclick = () => loadQuestion(i);
      container.appendChild(btn);
    });
  });
}

function filterQuestions() {
  buildSidebar(document.getElementById('filterInput').value);
}

function updateProgress() {
  const pct = Math.round(doneSet.size / QUESTIONS.length * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('headerProgress').textContent = `${doneSet.size} / ${QUESTIONS.length} ukończonych`;
  document.getElementById('statTotal').textContent = QUESTIONS.length;
  document.getElementById('statDone').textContent = doneSet.size;
}

function loadQuestion(idx) {
  currentIdx = idx;
  const q = QUESTIONS[idx];
  document.getElementById('welcome').style.display = 'none';
  document.getElementById('question-view').style.display = 'block';
  document.getElementById('qEra').textContent = q.era;
  document.getElementById('qTitle').textContent = q.title;
  document.getElementById('qSource').textContent = q.source;
  document.getElementById('hintTeza').textContent = q.teza;
  document.getElementById('hintLektura').textContent = q.lektura;
  document.getElementById('hintKontekst').textContent = q.kontekst;
  document.getElementById('inputTeza').value = '';
  document.getElementById('inputLektura').value = '';
  document.getElementById('inputKontekst').value = '';
  document.getElementById('feedback-box').innerHTML = '';
  document.getElementById('hintBox').style.display = 'none';
  document.getElementById('submitBtn').disabled = false;
  buildSidebar(document.getElementById('filterInput').value);
  window.scrollTo({ top: 0 });
}

function toggleHint() {
  const box = document.getElementById('hintBox');
  box.style.display = box.style.display === 'block' ? 'none' : 'block';
}

async function analyzeAnswer() {
  const teza = document.getElementById('inputTeza').value.trim();
  const lektura = document.getElementById('inputLektura').value.trim();
  const kontekst = document.getElementById('inputKontekst').value.trim();

  if (!teza && !lektura && !kontekst) {
    alert('Wypełnij przynajmniej jedno pole przed zatwierdzeniem.');
    return;
  }

  const q = QUESTIONS[currentIdx];
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('feedback-box').innerHTML = `<div class="feedback-loading"><div class="spinner"></div>AI analizuje Twoją odpowiedź…</div>`;

  const systemPrompt = `Jesteś ekspertem z języka polskiego przygotowującym uczniów do matury ustnej. 
Twoje zadanie: ocenić odpowiedź ucznia na pytanie maturalne. Odpowiadaj TYLKO po polsku, konkretnie i rzeczowo.
Struktura odpowiedzi musi być w JSON:
{
  "ocena": "Dobra" | "Średnia" | "Słaba" | "Bardzo dobra",
  "teza": { "wynik": "ok"|"warn"|"bad", "komentarz": "..." },
  "lektura": { "wynik": "ok"|"warn"|"bad", "komentarz": "..." },
  "kontekst": { "wynik": "ok"|"warn"|"bad", "komentarz": "..." },
  "podsumowanie": "..."
}
Wynik "ok" = poprawne, "warn" = częściowo poprawne lub niepełne, "bad" = błędne lub brakuje.
Bądź konkretny i pomocny. Wskaż co jest dobre, a co poprawić. Jeśli pole jest puste, zaznacz to w komentarzu.`;

  const userMsg = `PYTANIE MATURALNE: "${q.title}" (${q.source})

ODPOWIEDŹ UCZNIA:
1. TEZA: ${teza || '[nie wypełnione]'}
2. TREŚĆ LEKTURY: ${lektura || '[nie wypełnione]'}
3. KONTEKST ŻYCIOWY: ${kontekst || '[nie wypełnione]'}

WZORCOWA ODPOWIEDŹ (do porównania):
Wzorcowa teza: ${q.teza}
Wzorcowa lektura: ${q.lektura}
Wzorcowy kontekst: ${q.kontekst}

Oceń odpowiedź ucznia i wskaż konkretnie, co jest dobre, a co trzeba poprawić.`;

  try {
const resp = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: systemPrompt, // Przekazujemy tylko to, co obsługuje nasz nowy skrypt
        messages: [{ role: 'user', content: userMsg }]
      })
    });
const data = await resp.json();
const rawContent = data.content[0].text;
// Gemini z ustawieniem responseMimeType: "application/json" czasem zwraca string, a czasem obiekt
const parsed = typeof rawContent === 'string' ? JSON.parse(rawContent) : rawContent;
    renderFeedback(parsed);
    doneSet.add(currentIdx);
    saveDone();
    updateProgress();
    buildSidebar(document.getElementById('filterInput').value);
  } catch (e) {
    document.getElementById('feedback-box').innerHTML = `<p style="color:var(--red);padding:12px">Błąd analizy. Sprawdź połączenie i spróbuj ponownie.</p>`;
    document.getElementById('submitBtn').disabled = false;
  }
}

function wynikLabel(w) {
  if (w === 'ok') return '<span class="fb-label ok">✓ Dobrze</span>';
  if (w === 'warn') return '<span class="fb-label warn">⚠ Do poprawy</span>';
  return '<span class="fb-label bad">✗ Błąd / brak</span>';
}

function renderFeedback(p) {
  const badge = { 'Bardzo dobra': '🏆 Bardzo dobra', 'Dobra': '👍 Dobra', 'Średnia': '📝 Średnia', 'Słaba': '⚠️ Słaba' }[p.ocena] || p.ocena;
  document.getElementById('feedback-box').innerHTML = `
    <div class="feedback-card">
      <div class="feedback-card-header">
        Ocena odpowiedzi
        <span class="score-badge">${badge}</span>
      </div>
      <div class="feedback-body">
        <div class="feedback-section">
          ${wynikLabel(p.teza.wynik)}
          <div class="fb-label" style="margin-top:4px">Teza</div>
          <p>${p.teza.komentarz}</p>
        </div>
        <div class="feedback-section">
          ${wynikLabel(p.lektura.wynik)}
          <div class="fb-label" style="margin-top:4px">Treść lektury</div>
          <p>${p.lektura.komentarz}</p>
        </div>
        <div class="feedback-section">
          ${wynikLabel(p.kontekst.wynik)}
          <div class="fb-label" style="margin-top:4px">Kontekst życiowy</div>
          <p>${p.kontekst.komentarz}</p>
        </div>
        <div class="feedback-section" style="border-top:1px solid var(--border);padding-top:14px;margin-top:14px">
          <div class="fb-label" style="color:var(--gold-dark)">Podsumowanie</div>
          <p>${p.podsumowanie}</p>
        </div>
      </div>
    </div>
    <button class="next-btn" onclick="loadNextQuestion()">Następne pytanie →</button>
  `;
}

function loadNextQuestion() {
  const next = (currentIdx + 1) % QUESTIONS.length;
  loadQuestion(next);
}

// Init
buildSidebar();
updateProgress();
</script>
</body>
</html>
