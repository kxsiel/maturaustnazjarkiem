<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matura z AI | matury.netlify.app</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/Kqsyqol.png">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1209;
            --paper: #f5f0e8;
            --gold: #c8a84b;
            --gold-light: #e8cc78;
            --border: #d4c9b0;
            --bg-dark: #1c1710;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-dark);
            color: #f0e8d4;
            font-family: 'Lato', sans-serif;
            overflow-x: hidden;
        }

        /* === ANIMATED GRADIENT BACKGROUND === */
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #1c1710;
            overflow: hidden;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.45;
            animation: float linear infinite;
        }
        .orb1 { width: 600px; height: 600px; background: radial-gradient(circle, #5a3e1b, #2a1e0a); top: -10%; left: -10%; animation-duration: 18s; }
        .orb2 { width: 500px; height: 500px; background: radial-gradient(circle, #3d2e0f, #1a1209); top: 30%; right: -10%; animation-duration: 22s; animation-delay: -5s; }
        .orb3 { width: 400px; height: 400px; background: radial-gradient(circle, #c8a84b22, #7a6020); bottom: -5%; left: 30%; animation-duration: 28s; animation-delay: -10s; }
        .orb4 { width: 350px; height: 350px; background: radial-gradient(circle, #2e1f08, #5a3800); top: 60%; left: 10%; animation-duration: 20s; animation-delay: -3s; }

        @keyframes float {
            0%   { transform: translate(0, 0) scale(1); }
            25%  { transform: translate(40px, -30px) scale(1.05); }
            50%  { transform: translate(-20px, 50px) scale(0.95); }
            75%  { transform: translate(-50px, -20px) scale(1.08); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* === NAVBAR === */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 64px;
            background: rgba(20, 15, 8, 0.7);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(200, 168, 75, 0.15);
        }
        .nav-brand {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .nav-brand .title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--gold-light);
            letter-spacing: 0.06em;
        }
        .nav-brand .subtitle {
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(200, 168, 75, 0.6);
        }
        .nav-links {
            display: flex;
            gap: 8px;
        }
        .nav-btn {
            padding: 8px 20px;
            border: 1px solid rgba(200, 168, 75, 0.3);
            border-radius: 3px;
            background: transparent;
            color: rgba(200, 168, 75, 0.7);
            font-family: 'Lato', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-btn:hover, .nav-btn.active {
            background: rgba(200, 168, 75, 0.12);
            border-color: var(--gold);
            color: var(--gold-light);
        }

        /* === LAYOUT === */
        #app {
            position: relative;
            z-index: 1;
            display: flex;
            height: 100vh;
            padding-top: 64px;
        }

        /* === VIEWS === */
        .view { display: none; width: 100%; }
        .view.active { display: flex; }

        /* === EGZAMINATOR VIEW === */
        #view-egzaminator {
            flex-direction: row;
        }

        /* === SIDEBAR === */
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(15, 10, 5, 0.6);
            border-right: 1px solid rgba(200, 168, 75, 0.12);
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        .sidebar-h {
            padding: 18px 20px;
            background: rgba(200, 168, 75, 0.08);
            border-bottom: 1px solid rgba(200, 168, 75, 0.12);
        }
        .sidebar-h .s-title {
            font-weight: 900;
            font-size: 13px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--gold-light);
        }
        .sidebar-h .s-count {
            font-size: 11px;
            opacity: 0.5;
            margin-top: 2px;
            letter-spacing: 0.05em;
        }
        .search-box {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(200, 168, 75, 0.1);
        }
        .search-box input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid rgba(200, 168, 75, 0.2);
            border-radius: 3px;
            background: rgba(255,255,255,0.04);
            color: #f0e8d4;
            font-family: 'Lato', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input::placeholder { color: rgba(200,168,75,0.35); }
        .search-box input:focus { border-color: rgba(200, 168, 75, 0.5); }

        #qList {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(200,168,75,0.2) transparent;
        }
        .era-header {
            padding: 7px 15px;
            background: rgba(200, 168, 75, 0.06);
            font-weight: 900;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: rgba(200, 168, 75, 0.5);
            position: sticky;
            top: 0;
            border-bottom: 1px solid rgba(200,168,75,0.08);
            z-index: 2;
        }
        .q-item {
            padding: 10px 15px;
            border-bottom: 1px solid rgba(200, 168, 75, 0.06);
            cursor: pointer;
            font-size: 12.5px;
            transition: background 0.15s;
            line-height: 1.4;
        }
        .q-item b { color: #e8d8b0; font-weight: 700; }
        .q-item small { color: rgba(200,168,75,0.45); font-size: 11px; }
        .q-item:hover { background: rgba(200, 168, 75, 0.07); }
        .q-item.active {
            background: rgba(200, 168, 75, 0.14);
            border-left: 2px solid var(--gold);
        }
        .q-item.active b { color: var(--gold-light); }

        /* === MAIN EDITOR === */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            scrollbar-width: thin;
            scrollbar-color: rgba(200,168,75,0.2) transparent;
        }
        #welcome {
            text-align: center;
            margin-top: 120px;
            animation: fadeUp 0.6s ease;
        }
        #welcome h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            font-weight: 600;
            color: var(--gold-light);
            margin-bottom: 12px;
        }
        #welcome p {
            color: rgba(200, 168, 75, 0.5);
            font-size: 14px;
            letter-spacing: 0.05em;
        }

        .card {
            max-width: 680px;
            margin: 0 auto;
            background: rgba(10, 7, 3, 0.6);
            border: 1px solid rgba(200, 168, 75, 0.18);
            border-radius: 6px;
            padding: 36px;
            backdrop-filter: blur(10px);
            animation: fadeUp 0.4s ease;
        }
        .card h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--gold-light);
            margin-bottom: 8px;
            line-height: 1.3;
        }
        #qSource {
            font-style: italic;
            color: rgba(200,168,75,0.5);
            font-size: 13px;
            margin-bottom: 28px;
            letter-spacing: 0.04em;
        }
        .card label {
            display: block;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(200, 168, 75, 0.5);
            margin-bottom: 6px;
        }
        .card textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(200,168,75,0.18);
            border-radius: 3px;
            margin-bottom: 18px;
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            background: rgba(255,255,255,0.04);
            color: #f0e8d4;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.6;
        }
        .card textarea:focus { border-color: rgba(200,168,75,0.45); }
        .card textarea::placeholder { color: rgba(200,168,75,0.2); }

        .btn {
            background: linear-gradient(135deg, rgba(200,168,75,0.15), rgba(200,168,75,0.08));
            border: 1px solid rgba(200,168,75,0.4);
            color: var(--gold-light);
            padding: 16px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            border-radius: 3px;
            font-size: 12px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            transition: all 0.2s;
            font-family: 'Lato', sans-serif;
        }
        .btn:hover { background: rgba(200,168,75,0.2); border-color: var(--gold); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        #feedback {
            margin-top: 24px;
            padding: 20px;
            border-top: 3px solid var(--gold);
            background: rgba(200,168,75,0.04);
            border-radius: 0 0 4px 4px;
            display: none;
            line-height: 1.7;
            font-size: 14px;
            color: #ddd;
        }
        #feedback h3 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold-light);
            font-size: 18px;
            margin-bottom: 12px;
        }
        .loader {
            display: none;
            text-align: center;
            color: var(--gold);
            margin: 15px 0;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

        /* === PRZYKŁADY VIEW === */
        #view-przyklady {
            flex-direction: column;
            padding: 40px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(200,168,75,0.2) transparent;
        }
        .przyklady-header {
            max-width: 900px;
            margin: 0 auto 36px;
            text-align: center;
        }
        .przyklady-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 40px;
            font-weight: 600;
            color: var(--gold-light);
            margin-bottom: 10px;
        }
        .przyklady-header p {
            color: rgba(200,168,75,0.5);
            font-size: 14px;
            letter-spacing: 0.05em;
        }
        .era-section {
            max-width: 900px;
            margin: 0 auto 36px;
        }
        .era-section-title {
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            border-bottom: 1px solid rgba(200,168,75,0.2);
            padding-bottom: 10px;
            margin-bottom: 18px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px;
        }
        .ex-card {
            background: rgba(10,7,3,0.55);
            border: 1px solid rgba(200,168,75,0.13);
            border-radius: 6px;
            padding: 20px;
            transition: border-color 0.2s, background 0.2s;
            cursor: pointer;
            animation: fadeUp 0.4s ease;
        }
        .ex-card:hover {
            border-color: rgba(200,168,75,0.35);
            background: rgba(200,168,75,0.05);
        }
        .ex-card-source {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(200,168,75,0.4);
            margin-bottom: 6px;
        }
        .ex-card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--gold-light);
            margin-bottom: 12px;
            line-height: 1.3;
        }
        .ex-label {
            font-size: 9px;
            font-weight: 900;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(200,168,75,0.4);
            margin-top: 10px;
            margin-bottom: 3px;
        }
        .ex-text {
            font-size: 12.5px;
            color: rgba(240,232,212,0.75);
            line-height: 1.6;
        }
        .ex-badge {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(200,168,75,0.1);
            border: 1px solid rgba(200,168,75,0.2);
            border-radius: 2px;
            font-size: 10px;
            color: var(--gold);
            font-weight: 700;
            letter-spacing: 0.08em;
            margin-bottom: 10px;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<!-- NAVBAR -->
<nav>

<script>
const Q = [
    { e: "BIBLIA I ANTYK", t: "Motyw cierpienia niezawinionego", s: "Księga Hioba", teza: "Cierpienie nie zawsze jest karą za grzechy; bywa niezbadaną próbą wiary i elementem boskiego planu.", lektura: "Hiob traci majątek, dzieci i zdrowie, mimo że jest bezgranicznie prawy i bogobojny. Nie przeklina Boga, godzi się z losem i ostatecznie zostaje nagrodzony.", kontekst: "Poważne choroby (np. nowotwór u małego dziecka) lub nagłe klęski żywiołowe. Dotykają one uczciwych, dobrych ludzi, pokazując, że w życiu często nie ma sprawiedliwości opartej na zasadzie \"dobre uczynki to brak problemów\"." },
    { e: "BIBLIA I ANTYK", t: "Człowiek wobec niestałości świata", s: "Księga Koheleta", teza: "Dobra doczesne są znikome i przemijające (vanitas vanitatum – marność nad marnościami).", lektura: "Kohelet udowadnia, że bogactwo, sława i uciechy nie dają trwałego szczęścia, bo i tak kończą się śmiercią. Należy korzystać z prostych radości życia z zachowaniem bojaźni Bożej.", kontekst: "Pogoń za zasięgami, lajkami i bogactwem na Instagramie/TikToku. Złudne poczucie szczęścia oparte na statusie materialnym często prowadzi dziś do wypalenia zawodowego i depresji." },
    { e: "BIBLIA I ANTYK", t: "Wizja końca świata", s: "Apokalipsa św. Jana", teza: "Koniec świata to zarazem absolutna destrukcja zła i początek nowego, sprawiedliwego porządku.", lektura: "Symboliczne obrazy grozy (Czterej Jeźdźcy, kataklizmy, Bestia), po których następuje ostateczne zwycięstwo Boga, Sąd Ostateczny i nadejście Nowego Jeruzalem.", kontekst: "Lęk współczesnego człowieka przed globalnym ociepleniem, katastrofą klimatyczną czy zagrożeniem wojną nuklearną. Te codzienne lęki przypominają apokaliptyczne nastroje znane z Biblii." },
    { e: "BIBLIA I ANTYK", t: "Poświęcenie się w imię wyższych wartości", s: "Mitologia (Prometeusz)", teza: "Najwyższą formą heroizmu jest całkowite oddanie siebie w imię miłości do ludzkości lub ojczyzny.", lektura: "Prometeusz ulepił człowieka, a widząc jego słabość, wykradł dla niego ogień z Olimpu i nauczył rzemiosła, za co poniósł wieczną karę (przybicie do Kaukazu).", kontekst: "Współcześni ratownicy medyczni, lekarze na oddziałach zakaźnych (np. w trakcie pandemii) lub strażacy. Narażają oni własne zdrowie i życie, by służyć ratowaniu innych ludzi." },
    { e: "BIBLIA I ANTYK", t: "Problematyka winy i kary", s: "Mitologia (Syzyf)", teza: "Złamanie praw boskich lub moralnych pociąga za sobą nieuchronną, często wieczną karę.", lektura: "Syzyf za zdradzanie boskich tajemnic i uwięzienie Tanatosa zostaje skazany na bezcelową, wieczną pracę wtaczania głazu na górę.", kontekst: "Zjawisko hejtu w internecie lub nękania w szkole. Sprawca często na początku czuje się bezkarny, jednak z czasem spotyka go sprawiedliwość w postaci wyrzutów sumienia lub realnych konsekwencji prawnych." },
    { e: "BIBLIA I ANTYK", t: "Miłość silniejsza niż śmierć", s: "Mitologia (Orfeusz)", teza: "Prawdziwe uczucie potrafi pokonać najgroźniejsze przeszkody, łącznie z granicą zaświatów.", lektura: "Orfeusz z miłości do zmarłej Eurydyki schodzi do mrocznego Hadesu. Słuchem i śpiewem wzrusza bogów podziemi, zyskując szansę na wyprowadzenie żony.", kontekst: "Pielęgnowanie pamięci o bliskich zmarłych. Ludzie często zakładają fundacje imienia zmarłych dzieci lub małżonków, dzięki czemu miłość do tej osoby nadal przynosi dobro innym." },
    { e: "BIBLIA I ANTYK", t: "Heroizm w zmaganiu się z losem", s: "Iliada", teza: "Heroizm to wierność kodeksowi honorowemu i odwaga w obliczu nieuchronnej śmierci.", lektura: "Hektor staje do pojedynku z potężniejszym Achillesem. Mimo strachu i świadomości, że zginie, walczy do końca w obronie honoru i Troi.", kontekst: "Ratownicy z TOPR lub GOPR wychodzący w góry w trakcie skrajnych warunków pogodowych (lawiny, zamiecie), mając świadomość własnego zagrożenia, by ratować zaginionych turystów." },
    { e: "BIBLIA I ANTYK", t: "Prawa boskie a prawa ludzkie", s: "Antygona", teza: "Prawa boskie (moralne, wieczne) stoją w hierarchii wyżej niż zmienne i niedoskonałe prawa stanowione przez człowieka.", lektura: "Antygona grzebie zwłoki brata Polinika, łamiąc zakaz króla Kreona. Uważa, że obowiązek religijny i miłość braterska są ważniejsze niż nakazy władcy.", kontekst: "Akty obywatelskiego nieposłuszeństwa (np. protesty na Białorusi czy strajki w obronie praw człowieka). Ludzie decydują się łamać odgórne nakazy rządu z powodów czysto moralnych." },
    { e: "BIBLIA I ANTYK", t: "Człowiek wobec przeznaczenia", s: "Antygona", teza: "Przeznaczenie (fatum) jest nieuchronne, a próby ucieczki przed nim prowadzą do katastrofy (tragizm).", lektura: "Ród Labdakidów jest przeklęty. Działania Antygony i Kreona, choć z ich perspektywy słuszne, prowadzą do zguby, bo taki był wyrok losu.", kontekst: "Trudny do przezwyciężenia determinizm społeczny lub genetyczny. Jeśli ktoś urodzi się w środowisku patologicznym z dziedzicznymi obciążeniami, jego walka przypomina starcie z greckim fatum." },
    { e: "BIBLIA I ANTYK", t: "Obraz miłości w literaturze", s: "Pieśń nad Pieśniami", teza: "Miłość oblubieńcza jest najpiękniejszym i najwznioślejszym uczuciem łączącym człowieka z Bogiem i z drugim człowiekiem.", lektura: "Pieśń nad Pieśniami to poetycki dialog oblubieńca i oblubienicy, pełen zmysłowych metafor natury. Miłość ukazana jest jako siła tak potężna jak śmierć.", kontekst: "Współczesne pary w związkach na odległość. Mimo rozłąki utrzymują intensywną więź emocjonalną przez słowa – podobnie jak bohaterowie Pieśni." },
    { e: "ŚREDNIOWIECZE I RENESANS", t: "Motyw cierpiącej matki", s: "Lament świętokrzyski", teza: "Obraz cierpienia matki po utracie dziecka humanizuje postacie święte i podkreśla uniwersalność bólu.", lektura: "Matka Boska pod krzyżem nie jest wyniosłą królową, lecz zwykłą, zrozpaczoną kobietą (Stabat Mater Dolorosa). Pragnie ulżyć synowi w cierpieniu i szuka współczucia u ludzi.", kontekst: "Współczesne matki doświadczające niewyobrażalnego bólu po stracie dziecka (np. grupy wsparcia po wypadkach komunikacyjnych). Ich zmagania udowadniają, że więź macierzyńska od wieków pozostaje taka sama." },
    { e: "ŚREDNIOWIECZE I RENESANS", t: "Motyw tańca śmierci", s: "Rozmowa Mistrza Polikarpa ze Śmiercią", teza: "Śmierć jest wszechpotężna, nieuchronna i absolutnie sprawiedliwa (egalitarna) – dotknie każdego.", lektura: "Groteskowy obraz rozkładającego się trupa kobiety. Śmierć chwali się, że w jej tańcu (danse macabre) równi są królowie, papieże, chłopi i filozofowie.", kontekst: "Wobec ostatecznych zjawisk, takich jak ciężka diagnoza onkologiczna czy wypadek, nasz status materialny lub zawodowy przestaje mieć znaczenie. Śmierć i biologia traktują wszystkich po równo." },
    { e: "ŚREDNIOWIECZE I RENESANS", t: "Średniowieczny wzorzec rycerza", s: "Pieśń o Rolandzie", teza: "Idealny rycerz to człowiek bezwzględnie wierny Bogu, władcy i ojczyźnie, dbający nade wszystko o honor.", lektura: "Hrabia Roland wpada w zasadzkę w wąwozie Roncesvalles. Zbyt dumny, by wezwać pomoc rogiem, walczy do końca. Umiera na wzgórzu, twarzą do wroga, oddając rękawicę Bogu.", kontekst: "Etos żołnierza zawodowego lub policjanta składającego przysięgę służenia ojczyźnie. Zobowiązują się oni stawiać dobro ogółu ponad własne, prywatne bezpieczeństwo." },
    { e: "ŚREDNIOWIECZE I RENESANS", t: "Moralna odpowiedzialność za czyny", s: "Makbet", teza: "Każdy zły czyn niszczy psychikę sprawcy, a ucieczka przed moralną odpowiedzialnością jest niemożliwa.", lektura: "Makbet zabija króla Duncana. Zbrodnia pociąga za sobą kolejne, a bohaterowie wpadają w obłęd (halucynacje Makbeta, natręctwo mycia rąk przez Lady Makbet).", kontekst: "Osoby dopuszczające się przestępstw finansowych lub wieloletnich kłamstw (np. prowadzenie podwójnego życia). Nawet jeśli uciekną przed prawem, ciągły stres i strach ostatecznie niszczą ich psychikę." },
    { e: "ŚREDNIOWIECZE I RENESANS", t: "Czy człowiek decyduje o własnym losie?", s: "Makbet", teza: "Człowiek ma wolną wolę – przepowiednie lub zewnętrzne okoliczności mogą kusić, ale ostateczna decyzja zależy od niego.", lektura: "Wiedźmy jedynie podsycają uśpioną ambicję Makbeta. To on sam, pchnięty żądzami i namowami żony, decyduje się pójść drogą morderstwa.", kontekst: "Uleganie presji rówieśniczej. Kiedy młody człowiek znajduje się w grupie namawiającej do czegoś niebezpiecznego, może tłumaczyć się presją, jednak to jego wola i charakter decydują." },
    { e: "ŚREDNIOWIECZE I RENESANS", t: "Jaki wpływ na człowieka ma władza?", s: "Makbet", teza: "Władza zdobyta nieuczciwie korumpuje, rodzi paranoję i zamienia człowieka w tyrana.", lektura: "Makbet jako król żyje w ciągłym strachu przed utratą tronu. Staje się bezwzględnym dyktatorem, mordującym przyjaciół (Banko) i niewinne rodziny (Makdufa).", kontekst: "Zjawisko mobbingu w środowisku pracy. Czasami nadanie komuś nawet najmniejszego stanowiska kierowniczego ujawnia toksyczne i tyrańskie cechy charakteru tej osoby wobec podwładnych." },
    { e: "OŚWIECENIE I BAROK", t: "Czy dobra materialne dają szczęście?", s: "Skąpiec", teza: "Pieniądz, gdy staje się celem samym w sobie, niszczy człowieczeństwo i relacje z bliskimi.", lektura: "Harpagon kocha tylko swoją szkatułkę. Chciwość czyni go paranoikiem, niszczy życie jego dzieci i skazuje go na samotność i śmieszność.", kontekst: "Skrajny pracoholizm współczesnych rodziców, którzy próbują zabezpieczyć byt finansowy rodziny, pracując 24/7. W efekcie zdobywają bogactwo, ale stają się obcymi dla własnych dzieci." },
    { e: "OŚWIECENIE I BAROK", t: "Przyczyny nieporozumień rodzice-dzieci", s: "Skąpiec", teza: "Źródłem konfliktów pokoleniowych jest najczęściej odmienny system wartości i brak dialogu.", lektura: "Konflikt Harpagona z Kleantem i Elizą wynika z egoizmu ojca, który traktuje dzieci jak własność i przeszkodę finansową, ignorując ich prawo do miłości.", kontekst: "Częste spory dotyczące ścieżki kariery zawodowej. Rodzice pragną, aby ich dziecko wybrało opłacalny zawód, a dziecko chce spełniać własne, nowoczesne pasje." },
    { e: "OŚWIECENIE I BAROK", t: "Wady ludzkie w zwierciadle satyry", s: "Satyry (Krasicki)", teza: "Śmiech satyryczny ma cel dydaktyczny – wytyka wady społeczne, by skłonić do poprawy (ucząc bawić).", lektura: "Pijaństwo (krytyka sarmackiego zamiłowania do alkoholu) lub Żona modna (wyśmianie bezkrytycznego ulegania zagranicznej modzie i rozrzutności).", kontekst: "Współczesne kabarety, kanały stand-up oraz memy w internecie. Twórcy używają przesady i wyśmiewają nasze przywary, by obnażyć prawdę o naszym społeczeństwie." },
    { e: "ROMANTYZM", t: "Świat ducha a świat rozumu", s: "Romantyczność", teza: "Poznanie racjonalne (szkiełko i oko) jest ograniczone; pełną prawdę o świecie daje intuicja, wiara i uczucie.", lektura: "Obłąkana Karusia widzi zmarłego Jasieńka. Prosty lud wierzy dziewczynie i współczuje jej, podczas gdy Starzec szydzi z niej, bo nie widzi duchów szkiełkiem.", kontekst: "Zderzenie chłodnych algorytmów sztucznej inteligencji z człowiekiem. System komputerowy oceni zdolność kredytową wyłącznie w liczbach, a człowiek (doradca) potrafi spojrzeć na sytuację z ludzką empatią." },
    { e: "ROMANTYZM", t: "Ludowa sprawiedliwość i jej zasady", s: "Ballady (Mickiewicz)", teza: "W moralności ludowej nie ma zbrodni bez kary; natura aktywnie mści się za zło wyrządzone niewinnym.", lektura: "Lilije (żona zabija męża, z grobu wyrastają lilije; cerkiew zapada się pod ziemię z morderczynią) lub Świtezianka (Strzelec za zdradę przysięgi zostaje pochłonięty przez jezioro).", kontekst: "Powszechna wiara w popularną karmę. Kiedy ktoś wykorzystuje ludzi do robienia kariery, często z czasem traci wszystko i pozostaje na dnie bez przyjaciół – dobro i zło prędzej czy później bilansuje się." },
    { e: "ROMANTYZM", t: "Losy młodzieży polskiej pod zaborami", s: "Dziady cz. III", teza: "Młode pokolenie Polaków poddano brutalnym represjom, by zniszczyć w zarodku ducha patriotycznego.", lektura: "Sceny więzienne i opowieści męczeńskie: wywózki studentów i dzieci na Sybir (historia Janczewskiego), brutalne śledztwa (katowanie Cichowskiego, śmierć Rollisona).", kontekst: "Systemy totalitarne niszczące przyszłość młodych ludzi. Młodzież na Białorusi czy w Iranie angażująca się w politykę ponosi najwyższą karę, trafiając do więzień za sam fakt upominania się o wolność." },
    { e: "ROMANTYZM", t: "Mesjanizm jako romantyczna idea poświęcenia", s: "Dziady cz. III", teza: "Cierpienie narodu ma głęboki sens zbawczy – Polska jako Chrystus Narodów swoją męką odkupi wolność Europy.", lektura: "Widzenie księdza Piotra. Polska ukazana na krzyżu, duszona przez cara (Heroda). Z jej krwi ma narodzić się przyszły wybawca narodu (tajemniczy Mąż 44).", kontekst: "Współcześni działacze społeczni na rzecz praw człowieka, którzy pozwalają na własne uwięzienie, licząc na to, że ich cierpienie obudzi sumienia i wywoła zmianę w prawie całego państwa." },
    { e: "ROMANTYZM", t: "Postawy Polaków wobec zaborcy", s: "Dziady cz. III", teza: "Społeczeństwo jest głęboko podzielone na patriotyczną młodzież i lojalistyczną, zaprzańską elitę.", lektura: "Scena Salon Warszawski. Towarzystwo przy stoliku (arystokracja) rozmawia po francusku i podlizuje się carowi. Towarzystwo przy drzwiach (młodzież) rozmawia o martyrologii narodu. Słynne podsumowanie Wysockiego o lawie.", kontekst: "Podział społeczeństwa w obliczu kryzysu uchodźczego czy wojny. Część obywateli bezinteresownie angażuje się w ratowanie życia, a część zachowuje wrogość lub dba wyłącznie o egoistyczne interesy." },
    { e: "ROMANTYZM", t: "Postawy wobec Boga i cierpienia narodu", s: "Dziady cz. III", teza: "Człowiek może zbliżyć się do Boga przez pokorę lub oddalić się przez pychę i bunt.", lektura: "Prometejski bunt Konrada w Wielkiej Improwizacji (żąda rządu dusz, oskarżając Boga o brak serca) vs. absolutna pokora księdza Piotra (Panie, czymże ja jestem przed Twoim obliczem?), który w nagrodę otrzymuje prorocze widzenie.", kontekst: "Pycha i przekonanie współczesnego człowieka, że dzięki medycynie i technologii jest panem natury. Często zostaje boleśnie zweryfikowana podczas katastrofy (np. pandemii czy tsunami)." },
    { e: "ROMANTYZM", t: "Prawdy o człowieku zawarte w snach", s: "Dziady cz. III", teza: "Sny demaskują skrywane lęki, pragnienia oraz prawdziwe oblicze moralne człowieka.", lektura: "Sen Senatora – Nowosilcow śni o łasce cara, zaszczytach i pieniądzach, a potem o nagłej niełasce i pogardzie. Sen obnaża jego żądzę władzy i tchórzostwo.", kontekst: "Rola snów w psychoterapii i psychologii klinicznej. To w podświadomości ujawniają się najgłębsze traumy, lęki czy zmartwienia, z którymi pacjent boi się zmierzyć na jawie." },
    { e: "ROMANTYZM", t: "Motywy biblijne i ich znaczenie", s: "Dziady cz. III", teza: "Stylizacja biblijna nadaje wydarzeniom historycznym rangę sacrum i uniwersalizuje przekaz.", lektura: "Mickiewicz ukazuje procesję zesłańców jako drogę krzyżową, cara jako Heroda, a zaborców jako oprawców Chrystusa. Nadaje to cierpieniom Polaków sens metafizyczny.", kontekst: "Podczas państwowych uroczystości (np. rocznicy wybuchu Powstania Warszawskiego) mówcy odwołują się do pojęć ofiary, męki, krzyża. Nadaje to brutalnej wojnie aurę wielkości." },
    { e: "ROMANTYZM", t: "Walka dobra ze złem o duszę ludzką", s: "Dziady cz. III", teza: "Dusza ludzka to pole nieustannego starcia sił anielskich i demonicznych (psychomachia).", lektura: "W Prologu duchy walczą o śpiącego Gustawa. W trakcie Wielkiej Improwizacji diabły chcą doprowadzić Konrada do ostatecznego bluźnierstwa, czemu zapobiegają egzorcyzmy księdza Piotra.", kontekst: "Odwieczna wewnętrzna walka między lenistwem, chęcią pójścia na skróty (ściąganie na klasówce, omijanie prawa) a głosem sumienia. Zawsze mamy w głowie dylemat, którą moralną drogą obrać." },
    { e: "ROMANTYZM", t: "Czym dla człowieka jest wolność?", s: "Dziady cz. III", teza: "Wolność to stan ducha, którego nie są w stanie zniszczyć fizyczne kajdany.", lektura: "Przemiana Gustawa w Konrada w celi więziennej (napis: Umarł Gustaw, narodził się Konrad). Choć bohater jest zniewolony cieleśnie, zyskuje absolutną wolność twórczą i duchową.", kontekst: "Osoby odbywające wysokie wyroki, które w warunkach zamkniętej izolacji zdobywają wykształcenie, tworzą sztukę, nawracają się. Ich ciało jest uwięzione, jednak nareszcie odkryli wolność osobistą." },
    { e: "ROMANTYZM", t: "Motyw samotności bohatera romantycznego", s: "Dziady cz. III", teza: "Samotność wybitnej jednostki to ciężar, ale i warunek konieczny do tworzenia wielkiej poezji i podjęcia walki o naród.", lektura: "Konrad w Wielkiej Improwizacji czuje się wyobcowany: Samotność – cóż po ludziach... Niezrozumiany przez tłum, w samotności wznosi się na wyżyny ducha.", kontekst: "Los wizjonerów, sportowców, innowatorów czy naukowców pracujących nad nowymi lekarstwami. Początkowo nie mają poparcia, a żeby dojść do genialnych rezultatów, muszą odizolować się od świata." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Miłość – siła destrukcyjna czy motywująca?", s: "Lalka", teza: "Lalka to powieść o straconych złudzeniach – ukazuje klęskę ideałów romantycznych i trudności w realizacji haseł pozytywistycznych.", lektura: "Niszczące, wyidealizowane uczucie Wokulskiego do Izabeli Łęckiej. Miłość staje się obsesją, która uniemożliwia mu realizację marzeń i planów pozytywistycznych.", kontekst: "Idealizowanie osób z tzw. wyższych sfer w mediach społecznościowych. Podobnie jak w Lalce, zderzenie wyobrażeń z twardą rzeczywistością okazuje się brutalne i wyniszczające dla psychiki." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Praca jako pasja człowieka", s: "Lalka", teza: "Praca i działalność społeczna mogą być źródłem sensu życia, nawet gdy miłość zawodzi.", lektura: "Wokulski łączy w sobie romantycznego kochanka i pozytywistycznego pracownika. Jego kariera handlowa i naukowe zainteresowania pokazują, że praca może być zarówno pasją, jak i ucieczką.", kontekst: "Skrajny pracoholizm jako mechanizm obronny po rozpadzie związku. Wiele osób całkowicie oddaje się pracy, by zagłuszyć ból emocjonalny." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Rola majątku i pochodzenia w relacjach", s: "Lalka", teza: "Rozkład moralny arystokracji i bariery klasowe uniemożliwiają budowanie autentycznych relacji międzyludzkich.", lektura: "Izabela Łęcka jest więźniem swojej klasy społecznej. Nie może pokochać Wokulskiego, bo wywodzi się z nizin, choć jest bogatszy od niej.", kontekst: "Współczesne bariery społeczne w relacjach – np. rodziny z wyższych sfer, które odrzucają partnerów swoich dzieci ze względu na wykształcenie lub status materialny." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Konfrontacja marzeń z rzeczywistością", s: "Lalka", teza: "Zderzenie romantycznych ideałów z twardą rzeczywistością prowadzi do klęski i rozczarowania.", lektura: "Wokulski buduje cały swój świat na wyobrażeniu o Izabeli. Gdy iluzja pryska (scena w Paryżu), traci sens życia i próbuje popełnić samobójstwo.", kontekst: "Influencerzy budujący idealne życie w mediach społecznościowych. Konfrontacja ich wizerunku z realnym życiem często kończy się kryzysem psychicznym." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Miasto – przestrzeń przyjazna czy wroga?", s: "Lalka", teza: "Miasto jest przestrzenią ostrych kontrastów społecznych – przepaść między bogactwem a nędzą niszczy więzi wspólnotowe.", lektura: "Warszawa w Lalce: splendor Krakowskiego Przedmieścia i nędza Powiśla. Wokulski wędruje między tymi światami, nie należąc do żadnego.", kontekst: "Współczesna gentryfikacja miast. Drogie apartamenty w centrum są budowane tuż obok zdegradowanych dzielnic biedy, co pogłębia wykluczenie społeczne." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Znaczenie wspomnień w życiu człowieka", s: "Lalka", teza: "Wspomnienia kształtują tożsamość i mogą być zarówno źródłem siły, jak i pułapką uniemożliwiającą życie w teraźniejszości.", lektura: "Stary subiekt Rzecki przez całe życie żyje wspomnieniami o Napoleonie i przyjaźni z Minclami. Jego pamiętnik jest dokumentem życia oddanego przeszłości.", kontekst: "Ludzie po traumatycznych przeżyciach (PTSD) lub ci, którzy nie potrafią poradzić sobie ze stratą. Żyją przeszłością, nie potrafiąc budować przyszłości." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Postawy odwagi i tchórzostwa", s: "Potop", teza: "Prawdziwa odwaga to nie tylko brawura w walce, ale zdolność do poświęcenia prywaty dla ratowania ojczyzny.", lektura: "Kmicic z początku wykazuje odwagę straceńczą (awantury). Po przemianie w Babinicza wykazuje odwagę moralną i heroiczną (wysadzenie kolubryny pod Jasną Górą).", kontekst: "Posiadanie tzw. odwagi cywilnej – postawienie się szkolnemu chuliganowi w obronie słabszego ucznia. Ryzykujemy wtedy wyśmianiem z boku, ale ratujemy wyższe wartości." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Nie ma zbrodni doskonałej", s: "Zbrodnia i kara", teza: "Nie ma zbrodni doskonałej, a każda teoria usprawiedliwiająca zabójstwo w imię wyższych celów ponosi moralną klęskę.", lektura: "Raskolnikow dzieli ludzi na wszy i jednostki genialne (Napoleon). Zabija lichwiarkę, ale wyrzuty sumienia i strach przed zdemaskowaniem doprowadzają go do obłędu i przyznania się do winy.", kontekst: "Kwestia kary śmierci na świecie lub dyskusje o prawach do przeprowadzania eutanazji. Rodzi to stałe wątpliwości moralne, czy jakikolwiek człowiek ma prawo decydować o końcu życia drugiej osoby." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Przemiana wewnętrzna bohatera", s: "Zbrodnia i kara", teza: "Prawdziwa przemiana wewnętrzna jest możliwa tylko przez cierpienie, pokutę i miłość do bliźniego.", lektura: "Raskolnikow pod wpływem miłości Soni Marmieładowej i jej wiary w Boga decyduje się przyznać do winy. Zsyłka na Syberię staje się początkiem duchowego odrodzenia.", kontekst: "Programy resocjalizacyjne w więzieniach. Osadzeni, którzy biorą udział w terapii i uzyskują wsparcie emocjonalne, mają znacznie większe szanse na powrót do normalnego życia." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Miejsce na miłość w świecie zła", s: "Zbrodnia i kara", teza: "Miłość i wiara mogą ocalić człowieka nawet w najbardziej mrocznych okolicznościach.", lektura: "Sonia Marmieładowa – prostytutka z wyboru (ratuje rodzinę) – jest uosobieniem miłości ofiarnej. To jej bezwarunkowa miłość do Raskolnikowa prowadzi go ku odkupieniu.", kontekst: "Wolontariusze pracujący z osobami bezdomnymi lub uzależnionymi. Ich bezinteresowna miłość i zaangażowanie często są ostatnią deską ratunku dla zagubionych ludzi." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Motyw pokuty i odkupienia win", s: "Zbrodnia i kara", teza: "Odkupienie winy wymaga świadomego cierpienia i odrzucenia pychy.", lektura: "Raskolnikow musi przejść przez upokorzenie, chorobę, aresztowanie i zsyłkę, zanim osiągnie wewnętrzny spokój. Symboliczna scena ukłonu przed ludem na Placu Siennym.", kontekst: "Publiczne przeprosiny znanych osób (polityków, celebrytów) za popełnione błędy. Tylko szczera, a nie koniunkturalna skrucha jest w stanie odbudować zaufanie." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Miasto jako przestrzeń zbrodni", s: "Zbrodnia i kara", teza: "Miasto–dżungla, z jej anonimowością, biedą i gęstwą ludzkich losów, staje się przestrzenią, która demoralizuje i dehumanizuje.", lektura: "Petersburg w Zbrodni i karze to miasto duszne, cuchnące, pełne szynków i kamienic czynszowych. To środowisko katalizuje zbrodniczą filozofię Raskolnikowa.", kontekst: "Współczesne dzielnice wykluczenia w megamiastach. Anonimowość i bieda sprzyjają przestępczości – brak perspektyw prowadzi do desperacji i łamania prawa." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Bariery w porozumieniu społecznym", s: "Wesele", teza: "Przepaść mentalna, wzajemne uprzedzenia i pamięć o dawnych krwawych konfliktach uniemożliwiają solidarność narodową.", lektura: "Chłopi i inteligencja na weselu w Bronowicach. Inteligencja zachwyca się folklorem, ale nie rozumie realiów wsi. Chłopi pamiętają o Rabacji Galicyjskiej (widmo Jakuba Szeli).", kontekst: "Bańki informacyjne – każdy tworzy sobie własny, oddzielny świat i kręci się wokół tego samego źródła wiadomości. Prowadzi to do niszczenia dyskusji obywatelskiej." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Rola chłopów i inteligencji w walce", s: "Wesele", teza: "Naród jest niezdolny do czynu: chłopi mają zapał, ale brak im kierownictwa, a inteligencja jest bierna i pogrążona w dekadentyzmie.", lektura: "Gospodarz (inteligent) dostaje od Wernyhory Złoty Róg (symbol czynu), ale ze strachu/zmęczenia oddaje go prostemu Jaśkowi. Jasiek gubi róg, schylając się po czapkę z piór (prywata).", kontekst: "Słomiany zapał – np. ze styczniowych, szybkich obietnic kupna karnetu na siłownię. Ludzie mają na chwilę ogromne chęci i wiarę w czyny, by zaraz schować się do bezpiecznej kryjówki i zapomnieć o postanowieniach." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Sen o Polsce czy sąd nad Polską?", s: "Wesele", teza: "Utwór jest surowym sądem nad polskimi mitami narodowymi i bezsilnością współczesnego pokolenia.", lektura: "Wyspiański demaskuje mit o gotowości do walki. Finałowy chocholi taniec obnaża marazm i zniewolenie mentalne Polaków, którzy potrafią jedynie śnić o potędze.", kontekst: "Zespół reprezentacji piłki nożnej na największych imprezach. Często tworzy się iluzje i sny o pucharach, a w brutalnym zderzeniu z rzeczywistością – kończymy srogo rozebrani przez oceniającą nas publiczność." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Symboliczne znaczenie widm i zjaw", s: "Wesele", teza: "Zjawy (Osoby Dramatu) to materializacja podświadomości, wyrzutów sumienia i ukrytych pragnień realnych bohaterów.", lektura: "Stańczyk ukazuje się Dziennikarzowi (obnaża jego bierność i zakłamanie). Rycerz (Zawisza) ukazuje się Poecie (tęsknota za siłą i męstwem).", kontekst: "Stres pourazowy u ludzi (PTSD). Zjawiska takie powracają bardzo często w postaci potężnych traum ukrytych w psychice po nieszczęśliwym zdarzeniu (np. po wypadku samochodowym)." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Motyw tańca i jego rola", s: "Wesele", teza: "Taniec zmienia swoje znaczenie z witalnego obrzędu w symbol hipnozy i narodowej agonii.", lektura: "Początkowo dynamiczny taniec chłopów i panów (złudzenie jedności). W finale zamienia się w powolny, somnambuliczny taniec w rytm muzyki Chochoła – symbol uśpienia narodu.", kontekst: "Powracająca ucieczka do różnych używek, w świat alkoholu lub przewijanie Rolek po kilka godzin dziennie (jako powolny, uśpiony trans). Staje się to mechanizmem na unikanie życia w szarej rzeczywistości." },
    { e: "POZYTYWIZM I MŁODA POLSKA", t: "Obyczaj i tradycja w życiu gromady", s: "Chłopi", teza: "Tradycja i rytuały integrują społeczność, dają poczucie bezpieczeństwa i wyznaczają rytm ludzkiej egzystencji.", lektura: "Życie Lipiec podporządkowane jest kalendarzowi liturgicznemu i porom roku. Opisy obrzędów (wesele Boryny, kiszenie kapusty, Zaduszki) pokazują gromadę jako jeden spójny organizm.", kontekst: "Nasze klasyczne polskie Święta w grudniu czy niedzielne spotkania na rosole przy stole. W dzisiejszym zabieganym świecie tworzą one bardzo potrzebną wyspę rutyny i stabilizacji dla rodziny." },
    { e: "DWUDZIESTOLECIE MIĘDZYWOJENNE", t: "Szklane domy – wizja Polski", s: "Przedwiośnie", teza: "Powieść stawia dramatyczne pytanie o kształt odrodzonej Polski, konfrontując ze sobą radykalizm i powolne reformy.", lektura: "Szklane domy – utopijna wizja Seweryna Baryki (symbol idealnej, sprawiedliwej i nowoczesnej Polski). Rewolucja ukazana jako żywioł niszczycielski, ale kuszący biedotę.", kontekst: "Podejście do życiowych zmian czy rozwoju. Spór ten odwzorowuje ludzkie zastanawianie się, czy powoli wdrażać dyscyplinę na poprawę budżetu, czy liczyć na drastyczne i od razu zwalające z nóg metody." },
    { e: "DWUDZIESTOLECIE MIĘDZYWOJENNE", t: "Wojna i rewolucja jako doświadczenie", s: "Przedwiośnie", teza: "Rewolucja i wojna są doświadczeniem formującym, ale też traumatycznym, które pozostawia trwały ślad w psychice.", lektura: "Rzeź w Baku – Cezary Baryka jako chłopiec jest świadkiem masakry Ormian i brutalności rewolucji bolszewickiej. To doświadczenie determinuje jego późniejszą postawę.", kontekst: "Współcześni uchodźcy z Ukrainy czy Syrii, którzy jako dzieci byli świadkami okrucieństw wojny. Trauma wojenna towarzyszy im przez całe życie i kształtuje ich relacje i wybory." },
    { e: "DWUDZIESTOLECIE MIĘDZYWOJENNE", t: "Różne wizje odbudowy Polski", s: "Przedwiośnie", teza: "Pytanie o kształt Polski jest pytaniem o wartości – reforma czy rewolucja, elity czy lud.", lektura: "Gajowiec (reformista) vs. Lulek (komunista). Cezary Baryka stoi pośrodku, niezdolny do jednoznacznego wyboru, co symbolizuje bezradność pokolenia.", kontekst: "Współczesne debaty polityczne o kierunku rozwoju kraju. Podział na zwolenników stopniowych reform i radykalnych zmian systemowych jest obecny we wszystkich demokracjach." },
    { e: "DWUDZIESTOLECIE MIĘDZYWOJENNE", t: "Wybór drogi życiowej i ideowej", s: "Przedwiośnie", teza: "Wybór drogi życiowej i ideowej jest najtrudniejszym wyzwaniem pokolenia wkraczającego w dorosłość.", lektura: "Rozdarcie Cezarego między reformizmem Gajowca a radykalizmem komunistów (finałowy marsz na Belweder). Cezary nie jest w stanie dokonać ostatecznego wyboru.", kontekst: "Młodzi ludzie stojący przed wyborem kariery w korporacji lub działalności społecznej i aktywizmie. Dylemat między bezpiecznym konformizmem a ryzykownym zaangażowaniem." },
    { e: "DWUDZIESTOLECIE MIĘDZYWOJENNE", t: "Groteskowy obraz świata i człowieka", s: "Ferdydurke", teza: "Groteska demaskuje absurdalność form społecznych i masek, w które wtłaczany jest człowiek.", lektura: "30-letni Józio zostaje cofnięty do szkoły (upupienie). Świat rządzony jest przez absurdalne schematy: nauczyciel Bladaczka wymuszający zachwyt nad Słowackim, przyprawianie gęby u Młodziaków.", kontekst: "Absurdy wizyt w placówkach zdrowia lub podczas rekrutacji. Bardzo często zostajesz bezimiennym numerkiem i by przetrwać skomplikowaną procedurę – musisz przyklejać sobie odpowiednie gęby." },
    { e: "DWUDZIESTOLECIE MIĘDZYWOJENNE", t: "Formy i gęby – jak system narzuca role", s: "Ferdydurke", teza: "Przed presją społeczeństwa (Formą) nie ma ucieczki – człowiek zawsze przyjmuje jakąś maskę w relacji z innym człowiekiem.", lektura: "Józio ucieka ze szkoły do nowoczesnego domu Młodziaków, a stamtąd do tradycyjnego dworku w Bolimowie. Wszędzie jednak wpada w kolejne schematy zachowań. Słynna teza: Przed pupą nie ma ucieczki, jak tylko w inną pupę.", kontekst: "Uleganie trendom ubrań, piosenek oraz używanie nowego slangu, byleby zostać zaakceptowanym w otoczeniu paczki nowo zapoznanych kolegów na wyjeździe edukacyjnym czy pierwszej pracy." },
    { e: "WSPÓŁCZESNOŚĆ", t: "Upadek moralny w warunkach ekstremalnych", s: "Proszę państwa do gazu", teza: "Ekstremalne warunki obozowe prowadzą do całkowitego upadku moralnego – przetrwanie wymaga odrzucenia dawnej etyki.", lektura: "Opowiadania Borowskiego (behawioryzm). Tadek pracujący na rampie w Auschwitz jest znieczulony na widok śmierci. Matki wyrzekają się własnych dzieci, by uniknąć komory gazowej. Rządzi prawo biologicznego przetrwania.", kontekst: "Bezwzględne prawa dzisiejszych gangów oraz karteli narkotykowych. W otoczeniu, gdzie walka toczy się o dosłowne uniknięcie strzałów, nikt nie myśli o dobrych obyczajach czy wyższych wartościach." },
    { e: "WSPÓŁCZESNOŚĆ", t: "Znaczenie tytułu dla sensu utworu", s: "Inny świat", teza: "Tytuł sugeruje, że totalitarny obóz to przestrzeń o odwróconym dekalogu, do której nie można stosować normalnych miar moralnych.", lektura: "Motto z Dostojewskiego: Tu otwierał się inny, odrębny świat... W Jercewie zdrada, kradzież i donos są cnotami gwarantującymi życie, a litość i honor prowadzą do zguby.", kontekst: "Działanie sekciarskich i zmanipulowanych stowarzyszeń religijnych. W ich chorym, odizolowanym systemie złe zachowania pod groźbą traktowane są jako wzór postępowania." },
    { e: "WSPÓŁCZESNOŚĆ", t: "Konsekwencje zniewolenia w totalitaryzmie", s: "Inny świat", teza: "Zniewolenie niszczy psychikę, zabija empatię i sprowadza ludzką egzystencję do poziomu zwierzęcego.", lektura: "Więźniowie wycieńczeni głodem i katorżniczą pracą przy wyrębie lasu tracą ludzkie odruchy. Przykłady: gwałty w obozie (generalska tuczka), zgoda na podłość za miskę zupy.", kontekst: "Skrajne stadium ukrytych uzależnień chemicznych lub patologicznego hazardu. Zniewolenie umysłu sprawia, że osoba potrafi wynieść rzeczy z pokoju dziecięcego by opłacić kolejny dzień gry – odrzucając zasady." },
    { e: "WSPÓŁCZESNOŚĆ", t: "Zagłada z perspektywy świadka", s: "Zdążyć przed Panem Bogiem", teza: "Relacja naocznego świadka odziera historię z patosu, ukazując nieludzkie realia zagłady w surowy, reportażowy sposób.", lektura: "Edelman demitologizuje powstanie. Mówi o strachu, brudzie, samobójstwach (Anielewicz) i liczbach wywożonych na śmierć. Pokazuje bohaterstwo wyciszone, bez fanfar.", kontekst: "Dziennikarze reportażowi, którzy bez cenzury opublikują autentyczne nagrania drżącej ludności podczas dzisiejszych trwających wojen np. w Ukrainie – rezygnując z pokazywania pięknych i ładnych bitew w podręcznikach." },
    { e: "WSPÓŁCZESNOŚĆ", t: "Walka o godną śmierć i sens życia", s: "Zdążyć przed Panem Bogiem", teza: "Walka o ludzkie życie w czasie wojny (godna śmierć) różni się od walki w czasie pokoju (przedłużenie życia za wszelką cenę).", lektura: "Marek Edelman o Powstaniu w Getcie Warszawskim. Powstańcy nie walczyli o zwycięstwo, lecz o to, by nie dać się biernie zaprowadzić na Umschlagplatz – o godne umieranie z bronią w ręku.", kontekst: "Ludzie w krytycznym i pożegnalnym okresie terminalnym bardzo chcą sami decydować o ewentualnym wycofaniu męczącej procedury szpitalnej, aby swoje pożegnanie z bliskimi podtrzymać z jak największym prawem do spokoju." },
    { e: "WSPÓŁCZESNOŚĆ", t: "Pytanie o sens zła i cierpienia", s: "Dżuma", teza: "Niewytłumaczalne cierpienie (zwłaszcza niewinnych) wywołuje bunt i zmusza do przewartościowania wiary.", lektura: "Agonia małego synka sędziego Othona. Wobec potwornego cierpienia dziecka załamują się dogmaty – Rieux buntuje się przeciwko światu, w którym Bóg na to pozwala, a ksiądz Paneloux zmienia ton swoich kazań.", kontekst: "Setki pytań wierzących i racjonalistów podczas obserwacji gigantycznych powodzi niszczących całe wsie czy potężnych trzęsień ziemi. Pytanie gdzie w tym sens? po tragedii często weryfikuje dogmaty." },
    { e: "WSPÓŁCZESNOŚĆ", t: "Czy możliwa jest przyjaźń w skrajnościach?", s: "Dżuma", teza: "Wspólna walka z zagrożeniem rodzi najgłębsze więzi oparte na zaufaniu i braterstwie.", lektura: "Przyjaźń Rieux i Tarrou. Mimo zmęczenia i grozy zarazy potrafią znaleźć chwilę na szczerą rozmowę i symboliczną, oczyszczającą kąpiel w morzu.", kontekst: "Powstające nierozerwalne więzi pomiędzy strażakami w remizie czy na trudnych szkoleniach ochotników. Po wspólnie przetrwanych wyjściach na groźny incydent, ci zawodnicy ufają sobie ślepo." },
    { e: "WSPÓŁCZESNOŚĆ", t: "Różne postawy człowieka wobec zła", s: "Dżuma", teza: "Wobec zła można przyjąć postawę aktywnego oporu, biernej ucieczki lub wręcz żerowania na cudzym nieszczęściu.", lektura: "Opór: Rieux i formacje sanitarne. Bierność/Ucieczka: Początkowa postawa Ramberta (chce wyjechać do żony). Zysk: Cottard (przestępca, dla którego dżuma to eldorado).", kontekst: "Obserwacja przemocy w internecie lub bicia przez szyby pociągu przez huliganów. Jeden ucieknie z lęku, drugi nagra agresora, a ktoś kolejny zacznie okradać ofiarę z pozostawionych plecaków na peronie." },
    { e: "WSPÓŁCZESNOŚĆ", t: "Jednostka w systemie totalitarnym", s: "Rok 1984", teza: "Utopie dążące do doskonałości zawsze zamieniają się w krwawe antyutopie, niszczące jednostkę.", lektura: "Oceania to państwo idealnie zorganizowane przez Partię, ale ceną tej perfekcji jest totalna inwigilacja (teleekrany), brak wolności myśli i permanentny terror.", kontekst: "Bardzo popularne i nagłaśniane wprowadzanie punktowych systemów oceny społecznej na Dalekim Wschodzie. Państwo twierdzi, że zapewni to ład, ale jednocześnie kontroluje absolutnie każdy krok obywatela." },
    { e: "WSPÓŁCZESNOŚĆ", t: "Znaczenie propagandy w państwie", s: "Rok 1984", teza: "Propaganda służy fałszowaniu rzeczywistości i niszczeniu prawdy obiektywnej, by obywatele wierzyli w nieomylność władzy.", lektura: "Hasła Partii: Wojna to pokój, Wolność to niewola, Niewiedza to siła. Ministerstwo Prawdy nieustannie fałszuje gazety i książki historyczne (Kto kontroluje przeszłość, kontroluje przyszłość).", kontekst: "Trole opłacane, boty z Twittera i masowe fałszywe newsy przez generowane nagrania polityczne typu deepfake, które totalnie przesterowują pojęcie przeciętnego człowieka w sieci." },

let sel = null;
let currentView = 'egzaminator';

function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + name).classList.add('active');
    currentView = name;
    if (name === 'przyklady') renderExamples();
}

function render() {
    const search = document.getElementById('search').value.toLowerCase();
    const list = document.getElementById('qList');
    list.innerHTML = '';
    let lastEra = "";
    Q.filter(q => q.t.toLowerCase().includes(search) || q.s.toLowerCase().includes(search)).forEach((q) => {
        if(q.e !== lastEra) {
            lastEra = q.e;
            const h = document.createElement('div');
            h.className = 'era-header';
            h.innerText = lastEra;
            list.appendChild(h);
        }
        const item = document.createElement('div');
        item.className = 'q-item' + (sel === q ? ' active' : '');
        item.innerHTML = `<b>${q.t}</b><br><small>${q.s}</small>`;
        item.onclick = () => {
            sel = q;
            document.getElementById('welcome').style.display = 'none';
            document.getElementById('editor').style.display = 'block';
            document.getElementById('qTitle').innerText = q.t;
            document.getElementById('qSource').innerText = "Lektura: " + q.s;
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('inT').value = '';
            document.getElementById('inL').value = '';
            document.getElementById('inK').value = '';
            render();
        };
        list.appendChild(item);
    });
    const filtered = Q.filter(q => q.t.toLowerCase().includes(search) || q.s.toLowerCase().includes(search));
    document.getElementById('count').innerText = filtered.length + ' pytań jawnych';
}

function renderExamples() {
    const container = document.getElementById('exList');
    container.innerHTML = '';
    const eras = [...new Set(Q.map(q => q.e))];
    eras.forEach(era => {
        const sec = document.createElement('div');
        sec.className = 'era-section';
        sec.innerHTML = `<div class="era-section-title">${era}</div>`;
        const grid = document.createElement('div');
        grid.className = 'cards-grid';
        Q.filter(q => q.e === era).forEach(q => {
            const card = document.createElement('div');
            card.className = 'ex-card';
            card.innerHTML = `
                <div class="ex-card-source">${q.s}</div>
                <div class="ex-card-title">${q.t}</div>
                <div class="ex-label">Teza</div>
                <div class="ex-text">${q.teza}</div>
                <div class="ex-label">Argumentacja (lektura)</div>
                <div class="ex-text">${q.lektura}</div>
                <div class="ex-label">Kontekst życiowy</div>
                <div class="ex-text">${q.kontekst}</div>
            `;
            card.onclick = () => {
                showView('egzaminator');
                sel = q;
                document.getElementById('welcome').style.display = 'none';
                document.getElementById('editor').style.display = 'block';
                document.getElementById('qTitle').innerText = q.t;
                document.getElementById('qSource').innerText = "Lektura: " + q.s;
                document.getElementById('inT').value = q.teza;
                document.getElementById('inL').value = q.lektura;
                document.getElementById('inK').value = q.kontekst;
                document.getElementById('feedback').style.display = 'none';
                render();
            };
            grid.appendChild(card);
        });
        sec.appendChild(grid);
        container.appendChild(sec);
    });
}

async function askAI() {
    const btn = document.getElementById('btn');
    const loader = document.getElementById('loader');
    const fb = document.getElementById('feedback');

    // Pobieramy dane bezpośrednio z Twojego interfejsu
    const tytulTematu = sel ? sel.t : "Nieznany temat";
    const teza = document.getElementById('inT').value;
    const lekturaInfo = document.getElementById('inL').value;
    const kontekst = document.getElementById('inK').value;

    const prompt = `Jesteś konkretnym egzaminatorem CKE. Twoim zadaniem jest surowa ocena merytoryczna.

TEMAT WYBRANY PRZEZ UCZNIA: "${tytulTematu}"

ODPOWIEDŹ UCZNIA DO OCENY:
- Teza: ${teza}
- Argumentacja/Lektura: ${lekturaInfo}
- Kontekst: ${kontekst}

TWOJE ZADANIA:
1. IDENTYFIKACJA: Na podstawie powyższych danych ustal, o jakiej lekturze pisze uczeń i czy pasuje ona do tematu.
2. OCENA MERYTORYCZNA: Jeśli zdania są poprawne i sensowne, NIE ZMIENIAJ ICH. Potwierdź tylko, że są dobre.
3. BŁĘDY: Poprawiaj tylko wtedy, gdy uczeń pisze głupoty, myli fakty z lektury lub jego argumentacja jest nielogiczna. Napisz wtedy konkretnie: "Tu jest błąd rzeczowy: [opis], powinno być: [poprawka]".
4. KONTEKST: Sprawdź, czy kontekst (życiowy/historyczny) faktycznie wspiera tezę.
5. WERDYKT: Na koniec napisz krótko: "WERDYKT: JEST OKEJ" (jeśli praca przechodzi) lub "WERDYKT: SŁABO" (jeśli są kardynalne błędy).

FORMATOWANIE (BARDZO WAŻNE):
- Używaj TYLKO tagów HTML: <b>pogrubienie</b> oraz <br> dla nowej linii.
- NIE UŻYWAJ gwiazdek ani myślników z markdownu.`;

    btn.disabled = true;
    loader.style.display = 'block';
    fb.style.display = 'none';

    try {
        // Korzystamy z API, które ma dostęp do nowszych modeli
        const response = await fetch('https://free-unoficial-gpt4o-mini-api-g70n.onrender.com/chat/?query=' + encodeURIComponent(prompt));
        const data = await response.json();
        const aiResponse = data.results || data.reply || data.response || "Błąd komunikacji.";

        // Czyścimy tekst z gwiazdek i zamieniamy entery na tagi HTML
        const cleanResponse = aiResponse.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
                                        .replace(/\*(.*?)\*/g, "<i>$1</i>")
                                        .replace(/\n/g, "<br>");

        fb.innerHTML = "<h3>Werdykt Egzaminatora:</h3>" + cleanResponse;
        fb.style.display = 'block';
    } catch (e) {
        // Szybki fallback do Pollinations w razie awarii głównego API
        try {
            const altRes = await fetch('https://text.pollinations.ai/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: [{role: "user", content: prompt}], model: "openai" })
            });
            const altText = await altRes.text();
            fb.innerHTML = "<h3>Werdykt Egzaminatora:</h3>" + altText.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>").replace(/\n/g, "<br>");
            fb.style.display = 'block';
        } catch(e2) {
            fb.innerHTML = "<b style='color:#e88'>Błąd połączenia. Sprawdź internet.</b>";
            fb.style.display = 'block';
        }
    } finally {
        btn.disabled = false;
        loader.style.display = 'none';
    }
}

render();
</script>
